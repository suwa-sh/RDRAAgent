version: "1.0"
event_id: "20260327_130000_virtual_room"
created_at: "2026-03-27T13:00:00"
source: "Samples/貸し会議室SaaS/変更要望.txt"

requirements:
  - id: "REQ-011"
    requirement: "会議室オーナーがバーチャル会議室を登録・管理できるようにする"
    reason: "コロナ禍以降オンライン会議のニーズが増加しており、物理会議室だけでなくZoomやTeamsなどのオンライン会議室も貸し出し対象として扱えるようにするため"
    priority: "must"
    specifications:
      - id: "SPEC-011-01"
        specification: "バーチャル会議室の登録機能を提供する。会議ツール種別、同時接続数、録画可否などバーチャル会議室固有の属性を登録できるようにする"
        acceptance_criteria:
          - "Given 登録済みオーナー When バーチャル会議室登録画面で会議ツール種別・同時接続数・録画可否・価格を入力して登録する Then バーチャル会議室が登録され公開可能状態になる"
          - "Given 登録済みオーナー When 会議ツール種別としてZoom・Teams・Google Meetなどを選択できる Then 選択した会議ツール種別がバーチャル会議室情報に保存される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "会議室情報"
          - type: "variation"
            action: "add"
            target: "会議室種別"
          - type: "variation"
            action: "add"
            target: "会議ツール種別"
          - type: "buc"
            action: "modify"
            target: "会議室管理フロー"
      - id: "SPEC-011-02"
        specification: "会議室情報に会議室種別（物理・バーチャル）を追加し、種別に応じて登録項目を切り替えられるようにする"
        acceptance_criteria:
          - "Given オーナーが会議室を登録する When 会議室種別として「バーチャル」を選択する Then 所在地・広さなどの物理属性の代わりに会議ツール種別・同時接続数・録画可否が入力項目として表示される"
          - "Given オーナーが会議室を登録する When 会議室種別として「物理」を選択する Then 従来通り所在地・広さ・収容人数などが入力項目として表示される"
        affected_models:
          - type: "information"
            action: "modify"
            target: "会議室情報"
          - type: "variation"
            action: "add"
            target: "会議室種別"
          - type: "condition"
            action: "add"
            target: "会議室種別別登録条件"

  - id: "REQ-012"
    requirement: "利用者がバーチャル会議室を検索・予約できるようにする"
    reason: "利用者がオンライン会議のニーズに合ったバーチャル会議室を条件指定で探し出し、予約できるようにするため"
    priority: "must"
    specifications:
      - id: "SPEC-012-01"
        specification: "会議室検索条件に会議室種別（物理・バーチャル）、会議ツール種別、同時接続数を追加し、バーチャル会議室を検索できるようにする"
        acceptance_criteria:
          - "Given 利用者 When 会議室検索画面で会議室種別「バーチャル」を指定して検索する Then バーチャル会議室のみが検索結果に表示される"
          - "Given 利用者 When 会議ツール種別「Zoom」と同時接続数「50人以上」を指定して検索する Then 条件に合致するバーチャル会議室一覧が表示される"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "会議室検索条件"
          - type: "buc"
            action: "modify"
            target: "会議室予約フロー"
      - id: "SPEC-012-02"
        specification: "バーチャル会議室の予約機能を提供する。決済フローは物理会議室と同じフローを使用する"
        acceptance_criteria:
          - "Given 利用者がバーチャル会議室を選択 When 予約日時と決済方法を設定し予約する Then 予約が申請状態になり、物理会議室と同じ決済フローで処理される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "会議室予約フロー"
          - type: "information"
            action: "modify"
            target: "予約情報"

  - id: "REQ-013"
    requirement: "バーチャル会議室の予約確定時に会議URLを利用者に自動通知する"
    reason: "バーチャル会議室では物理的な鍵の受け渡しが不要であり、代わりに会議URLの自動通知によってスムーズに利用を開始できるようにするため"
    priority: "must"
    specifications:
      - id: "SPEC-013-01"
        specification: "バーチャル会議室の予約確定時に、オーナーが設定した会議URLを利用者に自動通知する機能を提供する"
        acceptance_criteria:
          - "Given バーチャル会議室の予約がオーナーに許諾された When 予約が確定状態に遷移する Then 会議URLが利用者にメール等で自動通知される"
          - "Given 物理会議室の予約が確定した When 予約が確定状態に遷移する Then 会議URL通知は行われない（従来通り鍵の受け渡しフロー）"
        affected_models:
          - type: "information"
            action: "add"
            target: "会議URL"
          - type: "buc"
            action: "modify"
            target: "会議室貸出管理フロー"
          - type: "condition"
            action: "add"
            target: "バーチャル会議室利用ポリシー"
      - id: "SPEC-013-02"
        specification: "バーチャル会議室では鍵の貸出・返却を不要とし、予約確定で利用開始、利用終了時刻到来で利用終了とする利用フローを提供する"
        acceptance_criteria:
          - "Given バーチャル会議室の予約が確定 When 利用開始時刻になる Then 会議室利用が自動的に利用開始状態になる（鍵の貸出記録は不要）"
          - "Given バーチャル会議室が利用中 When 利用終了時刻になる Then 会議室利用が自動的に利用終了状態になる（鍵の返却記録は不要）"
        affected_models:
          - type: "state"
            action: "modify"
            target: "会議室利用"
          - type: "condition"
            action: "add"
            target: "バーチャル会議室利用ポリシー"
          - type: "buc"
            action: "modify"
            target: "会議室貸出管理フロー"

  - id: "REQ-014"
    requirement: "バーチャル会議室にも評価機能を適用する"
    reason: "利用者がバーチャル会議室の品質（接続安定性、音質、操作性など）を評価し、他の利用者の意思決定を支援するため"
    priority: "should"
    specifications:
      - id: "SPEC-014-01"
        specification: "バーチャル会議室の利用終了後に、利用者がバーチャル会議室とオーナーを評価できるようにする。既存の会議室評価フローを適用する"
        acceptance_criteria:
          - "Given バーチャル会議室の利用終了後の利用者 When 会議室評価を登録する Then バーチャル会議室の評価が保存され会議室情報に反映される"
          - "Given バーチャル会議室の利用終了後の利用者 When オーナー評価を登録する Then オーナーの評価が保存される"
        affected_models:
          - type: "buc"
            action: "modify"
            target: "会議室評価フロー"
          - type: "information"
            action: "modify"
            target: "会議室評価"
