  diagram_mermaid: |
    erDiagram
      OWNER_PROFILE ||--o{ OWNER_APPLICATION : applies
      OWNER_PROFILE ||--o{ ROOM : owns
      ROOM ||--|| OPERATION_RULE : has
      ROOM ||--o{ RESERVATION : reserved
      ROOM ||--o{ ROOM_REVIEW : reviewed
      ROOM ||--o{ KEY : has
      ROOM ||--o{ USAGE_RECORD : used
      ROOM ||--o{ SALES_RECORD : earns
      RESERVATION ||--|| PAYMENT_INFO : pays
      RESERVATION ||--o{ ROOM_REVIEW : triggers
      RESERVATION ||--o{ USER_REVIEW : triggers
      RESERVATION ||--o{ KEY : uses
      RESERVATION ||--o{ USAGE_RECORD : generates
      RESERVATION ||--o{ INQUIRY : about
      USAGE_RECORD ||--o{ SALES_RECORD : calculates
      USAGE_RECORD ||--o{ FEE_RECORD : generates
      USAGE_RECORD ||--o{ USAGE_HISTORY : logs
      SALES_RECORD ||--o{ SETTLEMENT : settles
