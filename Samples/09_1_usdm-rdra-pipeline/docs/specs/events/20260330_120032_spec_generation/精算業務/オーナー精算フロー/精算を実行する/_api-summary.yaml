uc: "精算を実行する"
business: "精算業務"
buc: "オーナー精算フロー"
endpoints:
  - method: "POST"
    path: "/api/v1/admin/settlements/{id}/actions/execute"
    summary: "オーナーへの精算を決済機関を通じて実行する"
    request_schema: "ExecuteSettlementRequest"
    response_schema: "SettlementResponse"
    tags:
      - "精算"
async_events:
  - channel: "settlement-queue"
    direction: "publish"
    message_schema: "SettlementExecuteMessage"
    summary: "精算実行メッセージをワーカーに送信"
  - channel: "settlement-result-queue"
    direction: "publish"
    message_schema: "SettlementResultMessage"
    summary: "精算結果通知"
schemas:
  - name: "SettlementResponse"
    properties:
      - name: "id"
        type: "string"
        required: true
      - name: "ownerId"
        type: "string"
        required: true
      - name: "amount"
        type: "integer"
        required: true
      - name: "status"
        type: "string"
        required: true
  - name: "SettlementExecuteMessage"
    properties:
      - name: "settlementId"
        type: "string"
        required: true
      - name: "ownerId"
        type: "string"
        required: true
      - name: "amount"
        type: "integer"
        required: true
