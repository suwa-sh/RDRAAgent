version: "1.0"
description: "RoomConnect RDB テーブル定義"
datastore: "RDB"

tables:
  - name: "owner_profiles"
    rdra_info: "オーナープロフィール"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "name"
        type: "string"
        constraints: "NOT NULL"
      - name: "contact"
        type: "string"
        constraints: "NOT NULL"
      - name: "introduction"
        type: "string"
      - name: "status"
        type: "string"
        constraints: "NOT NULL"
      - name: "created_at"
        type: "timestamp"
        constraints: "NOT NULL"
      - name: "updated_at"
        type: "timestamp"
        constraints: "NOT NULL"
    indexes:
      - columns: ["id"]
        type: "PRIMARY"

  - name: "owner_applications"
    rdra_info: "オーナー申請"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "owner_id"
        type: "string"
        constraints: "NOT NULL, FK(owner_profiles.id)"
      - name: "applied_at"
        type: "timestamp"
        constraints: "NOT NULL"
      - name: "review_result"
        type: "string"
      - name: "reviewed_at"
        type: "timestamp"
    indexes:
      - columns: ["owner_id"]
        type: "INDEX"

  - name: "rooms"
    rdra_info: "会議室"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "name"
        type: "string"
        constraints: "NOT NULL"
      - name: "address"
        type: "string"
        constraints: "NOT NULL"
      - name: "price"
        type: "integer"
        constraints: "NOT NULL"
      - name: "capacity"
        type: "integer"
      - name: "features"
        type: "string[]"
      - name: "owner_id"
        type: "string"
        constraints: "NOT NULL, FK(owner_profiles.id)"
      - name: "created_at"
        type: "timestamp"
        constraints: "NOT NULL"
    indexes:
      - columns: ["owner_id"]
        type: "INDEX"
      - columns: ["price"]
        type: "INDEX"
      - columns: ["features"]
        type: "GIN"

  - name: "room_rules"
    rdra_info: "運用ルール"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id), UNIQUE"
      - name: "cancellation_policy"
        type: "string"
        constraints: "NOT NULL"
      - name: "is_available"
        type: "boolean"
        constraints: "NOT NULL DEFAULT true"
    indexes:
      - columns: ["room_id"]
        type: "UNIQUE"

  - name: "reservations"
    rdra_info: "予約"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "user_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
      - name: "start_at"
        type: "timestamp"
        constraints: "NOT NULL"
      - name: "end_at"
        type: "timestamp"
        constraints: "NOT NULL"
      - name: "status"
        type: "string"
        constraints: "NOT NULL"
      - name: "total_price"
        type: "integer"
        constraints: "NOT NULL"
      - name: "idempotency_key"
        type: "string"
        constraints: "UNIQUE"
      - name: "created_at"
        type: "timestamp"
        constraints: "NOT NULL"
    indexes:
      - columns: ["room_id", "start_at", "end_at"]
        type: "INDEX"
      - columns: ["user_id"]
        type: "INDEX"
      - columns: ["idempotency_key"]
        type: "UNIQUE"

  - name: "payments"
    rdra_info: "決済情報"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "reservation_id"
        type: "string"
        constraints: "NOT NULL, FK(reservations.id)"
      - name: "user_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "payment_method"
        type: "string"
        constraints: "NOT NULL"
      - name: "card_number_encrypted"
        type: "string"
      - name: "status"
        type: "string"
        constraints: "NOT NULL"
    indexes:
      - columns: ["reservation_id"]
        type: "INDEX"

  - name: "room_reviews"
    rdra_info: "会議室評価"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "user_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
      - name: "rating"
        type: "integer"
        constraints: "NOT NULL, CHECK(1<=rating AND rating<=5)"
      - name: "comment"
        type: "string"
      - name: "created_at"
        type: "timestamp"
        constraints: "NOT NULL"
    indexes:
      - columns: ["room_id"]
        type: "INDEX"
      - columns: ["user_id"]
        type: "INDEX"

  - name: "user_reviews"
    rdra_info: "利用者評価"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "owner_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "user_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "rating"
        type: "integer"
        constraints: "NOT NULL, CHECK(1<=rating AND rating<=5)"
      - name: "comment"
        type: "string"
      - name: "created_at"
        type: "timestamp"
        constraints: "NOT NULL"
    indexes:
      - columns: ["user_id"]
        type: "INDEX"

  - name: "keys"
    rdra_info: "鍵"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
      - name: "reservation_id"
        type: "string"
        constraints: "FK(reservations.id)"
      - name: "status"
        type: "string"
        constraints: "NOT NULL"
      - name: "lend_at"
        type: "timestamp"
      - name: "return_at"
        type: "timestamp"
    indexes:
      - columns: ["room_id"]
        type: "INDEX"

  - name: "usage_records"
    rdra_info: "利用実績"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
      - name: "reservation_id"
        type: "string"
        constraints: "NOT NULL, FK(reservations.id)"
      - name: "usage_date"
        type: "date"
        constraints: "NOT NULL"
      - name: "usage_hours"
        type: "decimal"
        constraints: "NOT NULL"
    indexes:
      - columns: ["room_id"]
        type: "INDEX"
      - columns: ["reservation_id"]
        type: "INDEX"

  - name: "revenue_records"
    rdra_info: "売上実績"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "owner_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
      - name: "amount"
        type: "integer"
        constraints: "NOT NULL"
      - name: "target_month"
        type: "string"
        constraints: "NOT NULL"
    indexes:
      - columns: ["owner_id", "target_month"]
        type: "INDEX"

  - name: "commission_revenue"
    rdra_info: "手数料売上"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "amount"
        type: "integer"
        constraints: "NOT NULL"
      - name: "target_month"
        type: "string"
        constraints: "NOT NULL"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
    indexes:
      - columns: ["target_month"]
        type: "INDEX"

  - name: "usage_history"
    rdra_info: "利用履歴"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "user_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "room_id"
        type: "string"
        constraints: "NOT NULL, FK(rooms.id)"
      - name: "usage_date"
        type: "date"
        constraints: "NOT NULL"
      - name: "usage_hours"
        type: "decimal"
        constraints: "NOT NULL"
    indexes:
      - columns: ["user_id"]
        type: "INDEX"
      - columns: ["room_id"]
        type: "INDEX"

  - name: "settlements"
    rdra_info: "精算情報"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "owner_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "target_month"
        type: "string"
        constraints: "NOT NULL"
      - name: "amount"
        type: "integer"
        constraints: "NOT NULL"
      - name: "status"
        type: "string"
        constraints: "NOT NULL"
      - name: "payment_date"
        type: "date"
      - name: "payment_ref"
        type: "string"
      - name: "executed_at"
        type: "timestamp"
    indexes:
      - columns: ["owner_id", "target_month"]
        type: "UNIQUE"

  - name: "inquiries"
    rdra_info: "問合せ"
    columns:
      - name: "id"
        type: "string"
        constraints: "PRIMARY KEY"
      - name: "sender_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "receiver_id"
        type: "string"
        constraints: "NOT NULL"
      - name: "subject"
        type: "string"
        constraints: "NOT NULL"
      - name: "content"
        type: "string"
        constraints: "NOT NULL"
      - name: "reply"
        type: "string"
      - name: "created_at"
        type: "timestamp"
        constraints: "NOT NULL"
    indexes:
      - columns: ["sender_id"]
        type: "INDEX"
      - columns: ["receiver_id"]
        type: "INDEX"

er_diagram: |
  ```mermaid
  erDiagram
    owner_profiles ||--o{ owner_applications : "申請"
    owner_profiles ||--o{ rooms : "所有"
    rooms ||--o| room_rules : "運用ルール"
    rooms ||--o{ reservations : "予約"
    rooms ||--o{ room_reviews : "評価"
    rooms ||--o{ keys : "鍵"
    rooms ||--o{ usage_records : "利用実績"
    reservations ||--o| payments : "決済"
    reservations ||--o{ keys : "鍵貸出"
    reservations ||--o{ usage_records : "利用記録"
    owner_profiles ||--o{ settlements : "精算"
    rooms ||--o{ commission_revenue : "手数料"
  ```
