asyncapi: "3.0.0"
info:
  title: "RoomConnect Async Events"
  version: "1.0.0"
  description: "貸し会議室サービス RoomConnect の非同期イベント仕様。精算処理のメッセージキューを定義する。"

channels:
  settlement-queue:
    address: "settlement-queue"
    description: "精算実行メッセージキュー。Backend API がパブリッシュし、Worker がコンシュームする。"
    messages:
      SettlementExecuteMessage:
        $ref: "#/components/messages/SettlementExecuteMessage"

  settlement-result-queue:
    address: "settlement-result-queue"
    description: "精算結果通知キュー。Worker がパブリッシュする。"
    messages:
      SettlementResultMessage:
        $ref: "#/components/messages/SettlementResultMessage"

operations:
  publishSettlementExecute:
    action: "send"
    channel:
      $ref: "#/channels/settlement-queue"
    summary: "精算実行メッセージをワーカーに送信する"
    messages:
      - $ref: "#/channels/settlement-queue/messages/SettlementExecuteMessage"

  consumeSettlementExecute:
    action: "receive"
    channel:
      $ref: "#/channels/settlement-queue"
    summary: "精算実行メッセージを受信し処理する"
    messages:
      - $ref: "#/channels/settlement-queue/messages/SettlementExecuteMessage"

  publishSettlementResult:
    action: "send"
    channel:
      $ref: "#/channels/settlement-result-queue"
    summary: "精算結果を通知する"
    messages:
      - $ref: "#/channels/settlement-result-queue/messages/SettlementResultMessage"

components:
  messages:
    SettlementExecuteMessage:
      name: "SettlementExecuteMessage"
      title: "精算実行メッセージ"
      contentType: "application/json"
      payload:
        type: object
        required:
          - settlementId
          - ownerId
          - amount
          - traceId
        properties:
          settlementId:
            type: string
            description: "精算ID"
          ownerId:
            type: string
            description: "オーナーID"
          amount:
            type: integer
            description: "精算額（円）"
          targetMonth:
            type: string
            description: "対象月（YYYY-MM）"
          traceId:
            type: string
            description: "トレースID（リクエスト起点から伝播）"
          idempotencyKey:
            type: string
            description: "冪等キー（二重精算防止）"

    SettlementResultMessage:
      name: "SettlementResultMessage"
      title: "精算結果メッセージ"
      contentType: "application/json"
      payload:
        type: object
        required:
          - settlementId
          - status
        properties:
          settlementId:
            type: string
            description: "精算ID"
          status:
            type: string
            enum:
              - "completed"
              - "failed"
            description: "精算結果ステータス"
          paymentRef:
            type: string
            description: "決済機関の取引参照番号"
          errorMessage:
            type: string
            description: "エラーメッセージ（失敗時のみ）"
          traceId:
            type: string
            description: "トレースID"
