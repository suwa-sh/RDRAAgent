uc: "予約を登録する"
business: "会議室予約業務"
buc: "会議室予約フロー"
models:
  - name: "ReservationForm"
    tier: "tier-frontend"
    layer: "ビュー層"
    type: "view-model"
    rdra_info: "予約"
  - name: "CreateReservationCommand"
    tier: "tier-backend-api"
    layer: "ユースケース層"
    type: "command"
    rdra_info: "予約"
  - name: "Reservation"
    tier: "tier-backend-api"
    layer: "ドメイン層"
    type: "entity"
    rdra_info: "予約"
  - name: "Payment"
    tier: "tier-backend-api"
    layer: "ドメイン層"
    type: "entity"
    rdra_info: "決済情報"
tables:
  - name: "reservations"
    rdra_info: "予約"
    operations:
      - type: "INSERT"
        columns:
          - name: "id"
            value: "UUID生成"
          - name: "user_id"
            value: "認証ユーザーID"
          - name: "room_id"
            value: "リクエストのroomId"
          - name: "start_at"
            value: "リクエストのstartAt"
          - name: "end_at"
            value: "リクエストのendAt"
          - name: "status"
            value: "仮予約"
          - name: "total_price"
            value: "計算結果"
          - name: "idempotency_key"
            value: "X-Idempotency-Keyヘッダー"
        where: ""
    indexes_needed:
      - columns: ["room_id", "start_at", "end_at"]
        reason: "時間帯重複チェック"
        access_pattern: "WHERE room_id = ? AND start_at < ? AND end_at > ?"
      - columns: ["idempotency_key"]
        reason: "冪等キーのUNIQUE制約"
        access_pattern: "WHERE idempotency_key = ?"
      - columns: ["user_id"]
        reason: "利用者の予約一覧取得"
        access_pattern: "WHERE user_id = ?"
  - name: "payments"
    rdra_info: "決済情報"
    operations:
      - type: "INSERT"
        columns:
          - name: "id"
            value: "UUID生成"
          - name: "reservation_id"
            value: "予約ID"
          - name: "payment_method"
            value: "リクエストのpaymentMethod"
          - name: "card_number_encrypted"
            value: "暗号化済みカード番号"
          - name: "status"
            value: "未決済"
        where: ""
    indexes_needed:
      - columns: ["reservation_id"]
        reason: "予約に紐づく決済情報取得"
        access_pattern: "WHERE reservation_id = ?"
kvs: []
object_storage: []
