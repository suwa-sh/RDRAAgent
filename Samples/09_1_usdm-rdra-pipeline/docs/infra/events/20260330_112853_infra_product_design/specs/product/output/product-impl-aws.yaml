schema_version: "1.0"
artifact_type: "implementation_spec"
skill_type: "product"
artifact_id: "product-kashikaigishitsu-impl-aws"
title: "貸し会議室サービス AWS 実装仕様"
status: "draft"
generated_at: "2026-03-30T11:32:05+09:00"
source_refs:
  - "aws-well-architected-framework"
  - "aws-rds-postgresql"
  - "aws-elasticache-redis"
decision_refs:
  - "product-decision-compute-model"
  - "product-decision-database-selection"
inputs_ref:
  - "product-kashikaigishitsu-mapping-aws"

vendor: "aws"
canonical_ref: "product-kashikaigishitsu-workload-model"
mapping_ref: "product-kashikaigishitsu-mapping-aws"

components:
  - id: "comp-eks-frontend"
    name: "フロントエンド EKS デプロイメント"
    canonical_element_id: "compute_frontend"
    vendor_service: "Amazon EKS"
    configuration:
      namespace: "kashikaigishitsu-{env}"
      deployment:
        replicas_min: 2
        replicas_max: 6
        image: "{ecr_repo}/kashikaigishitsu-frontend:latest"
        port: 3000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      hpa:
        target_cpu_utilization: 70
        target_memory_utilization: 80
      probes:
        readiness:
          path: "/api/health"
          period_seconds: 10
        liveness:
          path: "/api/health"
          period_seconds: 30
      network_policy:
        ingress_from: "api-gateway"
        egress_to: "backend-api"
    dependencies:
      - "comp-api-gateway"
      - "comp-cloudfront"
    iac_module: "infra/product/aws/modules/eks-frontend"
    validation_rules:
      - rule: "レプリカ数が 2 以上であること"
        type: "static"
        description: "高可用性のため最低 2 レプリカ"

  - id: "comp-api-gateway"
    name: "API Gateway"
    canonical_element_id: "api_gateway"
    vendor_service: "Amazon API Gateway"
    configuration:
      api_type: "REST"
      stage: "{env}"
      authorizer:
        type: "COGNITO_USER_POOLS"
        user_pool_id: "{cognito_user_pool_id}"
      waf:
        web_acl: "kashikaigishitsu-waf-{env}"
        managed_rules:
          - "AWSManagedRulesCommonRuleSet"
          - "AWSManagedRulesKnownBadInputsRuleSet"
          - "AWSManagedRulesSQLiRuleSet"
        rate_limit:
          default: 1000
          per_ip: 100
      throttling:
        burst_limit: 500
        rate_limit: 1000
      tls_version: "TLS_1_2"
    dependencies:
      - "comp-eks-backend"
      - "comp-cognito"
      - "comp-waf"
    iac_module: "infra/product/aws/modules/api-gateway"
    validation_rules:
      - rule: "WAF が有効であること"
        type: "static"
        description: "NFR E.10.1.1 WAF(Lv2) 準拠"

  - id: "comp-waf"
    name: "WAF"
    canonical_element_id: "api_gateway"
    vendor_service: "AWS WAF"
    configuration:
      web_acl_name: "kashikaigishitsu-waf-{env}"
      scope: "REGIONAL"
      rules:
        - name: "common-rules"
          managed_rule_group: "AWSManagedRulesCommonRuleSet"
          priority: 1
        - name: "bad-inputs"
          managed_rule_group: "AWSManagedRulesKnownBadInputsRuleSet"
          priority: 2
        - name: "sqli"
          managed_rule_group: "AWSManagedRulesSQLiRuleSet"
          priority: 3
        - name: "rate-limit"
          type: "rate_based"
          limit: 2000
          priority: 4
      logging:
        enabled: true
        destination: "CloudWatch Logs"
    dependencies: []
    iac_module: "infra/product/aws/modules/waf"
    validation_rules: []

  - id: "comp-eks-backend"
    name: "バックエンド API EKS デプロイメント"
    canonical_element_id: "compute_backend"
    vendor_service: "Amazon EKS"
    configuration:
      namespace: "kashikaigishitsu-{env}"
      deployment:
        replicas_min: 2
        replicas_max: 10
        image: "{ecr_repo}/kashikaigishitsu-backend:latest"
        port: 3000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      hpa:
        target_cpu_utilization: 70
        target_memory_utilization: 80
      probes:
        readiness:
          path: "/api/v1/health"
          period_seconds: 10
        liveness:
          path: "/api/v1/health"
          period_seconds: 30
      pod_identity:
        service_account: "kashikaigishitsu-backend"
        iam_role: "kashikaigishitsu-backend-{env}"
      env_vars:
        DATABASE_URL: "secretsmanager:/kashikaigishitsu/database-url"
        REDIS_URL: "secretsmanager:/kashikaigishitsu/redis-url"
        PAYMENT_API_URL: "secretsmanager:/kashikaigishitsu/payment-api-url"
    dependencies:
      - "comp-rds"
      - "comp-elasticache"
      - "comp-sqs"
    iac_module: "infra/product/aws/modules/eks-backend"
    validation_rules:
      - rule: "レプリカ数が 2 以上であること"
        type: "static"
        description: "高可用性のため最低 2 レプリカ"

  - id: "comp-eks-worker"
    name: "精算バッチワーカー CronJob"
    canonical_element_id: "compute_worker"
    vendor_service: "Amazon EKS CronJob"
    configuration:
      namespace: "kashikaigishitsu-{env}"
      cronjob:
        schedule: "0 2 L * *"
        concurrency_policy: "Forbid"
        starting_deadline_seconds: 300
        active_deadline_seconds: 28800
        image: "{ecr_repo}/kashikaigishitsu-worker:latest"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
      pod_identity:
        service_account: "kashikaigishitsu-worker"
        iam_role: "kashikaigishitsu-worker-{env}"
    dependencies:
      - "comp-rds"
      - "comp-sqs"
    iac_module: "infra/product/aws/modules/eks-worker"
    validation_rules:
      - rule: "activeDeadlineSeconds が 28800（8 時間）以内であること"
        type: "static"
        description: "NFR B.2.2.1 バッチ処理時間(Lv2) 準拠"

  - id: "comp-rds"
    name: "RDS for PostgreSQL"
    canonical_element_id: "database_primary"
    vendor_service: "Amazon RDS for PostgreSQL"
    configuration:
      engine: "postgres"
      engine_version: "16"
      instance_class: "db.r6g.large"
      storage:
        type: "gp3"
        size_gb: 100
        max_allocated_gb: 500
        encrypted: true
        kms_key: "alias/kashikaigishitsu-rds-{env}"
      multi_az: true
      backup:
        retention_period_days: 35
        preferred_window: "03:00-04:00"
      maintenance:
        preferred_window: "sun:04:00-sun:05:00"
      parameter_group:
        max_connections: 200
        shared_buffers: "256MB"
        effective_cache_size: "1536MB"
        log_min_duration_statement: 1000
        log_statement: "ddl"
      performance_insights:
        enabled: true
        retention_days: 7
      monitoring:
        enhanced_monitoring: true
        interval: 60
      vpc:
        subnet_group: "kashikaigishitsu-db-{env}"
        security_group: "kashikaigishitsu-rds-sg-{env}"
    dependencies: []
    iac_module: "infra/product/aws/modules/rds"
    validation_rules:
      - rule: "multi_az が true であること"
        type: "static"
        description: "NFR A.2.5.1 ストレージ冗長化(Lv3) 準拠"
      - rule: "backup.retention_period_days が 30 以上であること"
        type: "static"
        description: "NFR C.1.2.3 バックアップ世代管理(Lv3) 準拠"
      - rule: "storage.encrypted が true であること"
        type: "static"
        description: "NFR E.6.1.1 データ暗号化準拠"

  - id: "comp-elasticache"
    name: "ElastiCache for Redis"
    canonical_element_id: "cache"
    vendor_service: "Amazon ElastiCache for Redis"
    configuration:
      engine_version: "7.1"
      node_type: "cache.r6g.large"
      num_cache_clusters: 2
      automatic_failover: true
      multi_az: true
      transit_encryption: true
      at_rest_encryption: true
      kms_key: "alias/kashikaigishitsu-redis-{env}"
      parameter_group:
        maxmemory_policy: "volatile-lru"
      snapshot:
        retention_limit: 7
        window: "04:00-05:00"
      vpc:
        subnet_group: "kashikaigishitsu-redis-{env}"
        security_group: "kashikaigishitsu-redis-sg-{env}"
    dependencies: []
    iac_module: "infra/product/aws/modules/elasticache"
    validation_rules:
      - rule: "multi_az が true であること"
        type: "static"
        description: "高可用性確保"
      - rule: "transit_encryption が true であること"
        type: "static"
        description: "CTR-001 全通信 TLS 準拠"

  - id: "comp-sqs"
    name: "SQS キュー"
    canonical_element_id: "message_queue"
    vendor_service: "Amazon SQS"
    configuration:
      queue_name: "kashikaigishitsu-settlement-{env}"
      type: "standard"
      visibility_timeout: 1800
      message_retention_days: 14
      receive_wait_time: 20
      dead_letter_queue:
        queue_name: "kashikaigishitsu-settlement-dlq-{env}"
        max_receive_count: 3
      encryption:
        type: "SSE-SQS"
    dependencies: []
    iac_module: "infra/product/aws/modules/sqs"
    validation_rules:
      - rule: "デッドレターキューが設定されていること"
        type: "static"
        description: "処理失敗メッセージの追跡と再処理"

  - id: "comp-cloudfront"
    name: "CloudFront ディストリビューション"
    canonical_element_id: "cdn"
    vendor_service: "Amazon CloudFront"
    configuration:
      origins:
        - id: "s3-static"
          domain: "{s3_bucket}.s3.amazonaws.com"
          access: "OAC"
        - id: "api-gateway"
          domain: "{api_gateway_url}"
          access: "custom"
      default_cache_behavior:
        target_origin: "s3-static"
        viewer_protocol_policy: "redirect-to-https"
        cache_policy: "CachingOptimized"
      cache_behaviors:
        - path_pattern: "/api/*"
          target_origin: "api-gateway"
          viewer_protocol_policy: "https-only"
          cache_policy: "CachingDisabled"
      price_class: "PriceClass_200"
      tls:
        minimum_protocol_version: "TLSv1.2_2021"
        certificate: "ACM"
    dependencies:
      - "comp-api-gateway"
    iac_module: "infra/product/aws/modules/cloudfront"
    validation_rules:
      - rule: "viewer_protocol_policy が https-only または redirect-to-https であること"
        type: "static"
        description: "CTR-001 全通信 TLS 準拠"

  - id: "comp-cognito"
    name: "Cognito ユーザープール"
    canonical_element_id: "idp"
    vendor_service: "Amazon Cognito"
    configuration:
      user_pool_name: "kashikaigishitsu-{env}"
      mfa:
        configuration: "OPTIONAL"
        methods: ["TOTP", "SMS"]
      password_policy:
        minimum_length: 12
        require_uppercase: true
        require_lowercase: true
        require_numbers: true
        require_symbols: true
      groups:
        - name: "users"
          description: "一般利用者"
        - name: "owners"
          description: "会議室オーナー"
        - name: "operators"
          description: "サービス運営担当者"
      token:
        access_token_validity_minutes: 60
        refresh_token_validity_days: 30
        id_token_validity_minutes: 60
      app_client:
        name: "kashikaigishitsu-web-{env}"
        auth_flows: ["ALLOW_REFRESH_TOKEN_AUTH", "ALLOW_USER_SRP_AUTH"]
        callback_urls: ["https://{domain}/auth/callback"]
        logout_urls: ["https://{domain}/auth/logout"]
    dependencies: []
    iac_module: "infra/product/aws/modules/cognito"
    validation_rules:
      - rule: "MFA が設定されていること"
        type: "static"
        description: "NFR E.5.1.1 認証方式(Lv3) MFA 対応"
