  - "product-kashikaigishitsu-service-input"

decision:
  context: "セッション情報と冪等キーの管理に使用するキャッシュストアの選定"
  conflict_type: "capability"
  options:
    - id: "opt-elasticache-redis"
      description: "Amazon ElastiCache for Redis。マルチ AZ レプリケーション"
      pros:
        - "TTL 付きキー管理に最適"
        - "セッション情報と冪等キーの両方を 1 クラスタで管理可能"
        - "マルチ AZ フェイルオーバーで高可用性"
        - "保管時・転送中暗号化に対応"
      cons:
        - "常時起動のためゼロ負荷時もコストが発生"
    - id: "opt-elasticache-serverless"
      description: "Amazon ElastiCache Serverless for Redis。自動スケーリング"
      pros:
        - "ゼロからのスケーリングでコスト効率"
        - "インフラ管理不要"
      cons:
        - "接続数の制限がある"
        - "レイテンシが若干高い"
    - id: "opt-dynamodb"
      description: "Amazon DynamoDB。TTL 付きアイテムでセッション/冪等キーを管理"
      pros:
        - "マネージドで運用負荷が低い"
        - "オンデマンドモードでゼロコストスタート"
      cons:
        - "Redis ほどの低レイテンシではない"
        - "セッション情報のデータ構造が制限される"
  chosen_option: "opt-elasticache-redis"
  rationale: "セッション管理と冪等キー管理の両方を高速に処理する必要がある。50 rps のベースラインに対してElastiCache for Redis のレイテンシ特性が最適。マルチ AZ で SLA 99.9% に貢献。将来的にコスト最適化が必要な場合は Serverless への移行を検討"
  risk_assessment: "低負荷時の固定コストが発生するが、balanced コスト戦略の範囲内"
  affected_elements:
    - "cache"
  review_date: "2026-09-30"
