artifact_id: "product-decision-database-selection"
title: "データベース選定: RDS for PostgreSQL"
status: "accepted"
generated_at: "2026-03-30T11:32:05+09:00"
source_refs:
  - "aws-rds-postgresql"
inputs_ref:
  - "product-kashikaigishitsu-service-input"

decision:
  context: "貸し会議室サービスの RDB として、RDS for PostgreSQL、Aurora PostgreSQL、RDS for MySQL のいずれを採用するか"
  conflict_type: "capability"
  options:
    - id: "opt-rds-pg"
      description: "Amazon RDS for PostgreSQL。マルチ AZ 同期レプリケーション"
      pros:
        - "PostgreSQL の豊富な機能（JSON、全文検索、UPSERT）"
        - "マルチ AZ 同期レプリケーションで NFR A.2.5.1 準拠"
        - "35 日自動バックアップで NFR C.1.2.3 準拠"
        - "コスト効率が良い（Aurora より安価）"
      cons:
        - "Aurora ほどの自動スケーリング能力がない"
    - id: "opt-aurora-pg"
      description: "Amazon Aurora PostgreSQL。ストレージ自動拡張、最大 15 リードレプリカ"
      pros:
        - "ストレージの自動拡張"
        - "高い読み取りスケーラビリティ"
        - "より高速なフェイルオーバー（30 秒以内）"
      cons:
        - "RDS の 1.5-2 倍のコスト"
        - "SLA 99.9% に対してオーバースペック"
    - id: "opt-rds-mysql"
      description: "Amazon RDS for MySQL"
      pros:
        - "広く使われているため運用知見が豊富"
      cons:
        - "UPSERT（冪等キー処理）の構文が PostgreSQL より制限される"
        - "JSON 操作の柔軟性が PostgreSQL に劣る"
  chosen_option: "opt-rds-pg"
  rationale: "SLA 99.9% とバランス型コスト戦略に対し、RDS for PostgreSQL がコスト効率と機能のバランスに優れる。冪等キーの UPSERT 処理に PostgreSQL の ON CONFLICT 構文が適している。将来的に負荷増大した場合は Aurora への移行パスがある"
  risk_assessment: "読み取り負荷が想定を大幅に超えた場合、リードレプリカの追加が必要。その場合は Aurora への移行を検討"
  affected_elements:
    - "database_primary"
  review_date: "2026-09-30"
