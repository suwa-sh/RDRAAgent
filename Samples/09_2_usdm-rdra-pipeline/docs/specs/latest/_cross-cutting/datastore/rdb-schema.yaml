        on_delete: "RESTRICT"
    indexes:
      - name: "uq_settlements_owner_month"
        columns:
          - "owner_id"
          - "settlement_month"
        unique: true
        reason: "ユニーク制約: 同一オーナー・同一月の重複精算防止"
