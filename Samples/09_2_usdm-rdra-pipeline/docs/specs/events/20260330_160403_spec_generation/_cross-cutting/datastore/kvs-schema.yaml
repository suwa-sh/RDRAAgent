version: "1.0"
datastore: "kvs"

key_patterns:
  - pattern: "session:user:{user_id}"
    purpose: "session"
    value_type: "JSON (user profile, role, token metadata)"
    ttl: "1h"
    used_by:
      - "会議室を照会する"
      - "会議室を予約する"
    description: "利用者セッション情報。JWT リフレッシュトークン管理"
  - pattern: "session:owner:{owner_id}"
    purpose: "session"
    value_type: "JSON (owner profile, role, token metadata)"
    ttl: "1h"
    used_by:
      - "オーナーを登録する"
      - "会議室を登録する"
    description: "オーナーセッション情報。JWT リフレッシュトークン管理"
  - pattern: "session:admin:{admin_id}"
    purpose: "session"
    value_type: "JSON (admin profile, role, token metadata)"
    ttl: "30m"
    used_by:
      - "オーナー申請を審査する"
      - "オーナー精算を実行する"
    description: "管理者セッション情報。より短い TTL でセキュリティ強化"
  - pattern: "idempotency:{idempotency_key}"
    purpose: "lock"
    value_type: "JSON (request hash, response, created_at)"
    ttl: "24h"
    used_by:
      - "会議室を予約する"
      - "オーナー精算を実行する"
    description: "冪等キー管理。重複リクエスト検知用"
  - pattern: "cache:room:{room_id}"
    purpose: "cache"
    value_type: "JSON (room detail with reviews)"
    ttl: "15m"
    used_by:
      - "会議室を照会する"
    description: "会議室詳細キャッシュ。検索結果の高速化"
  - pattern: "rate-limit:api:{client_ip}"
    purpose: "rate-limit"
    value_type: "integer (request count)"
    ttl: "1m"
    used_by:
      - "会議室を照会する"
    description: "APIレート制限カウンター。IP単位"
