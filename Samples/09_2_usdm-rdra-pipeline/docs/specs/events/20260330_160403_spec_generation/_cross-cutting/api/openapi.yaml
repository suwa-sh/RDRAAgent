openapi: "3.1.0"
info:
  title: "RoomConnect API"
  version: "1.0.0"
  description: "貸し会議室サービス RoomConnect の統合 API 仕様"
servers:
  - url: "https://api.roomconnect.example.com"
    description: "本番環境"
paths:
  /api/v1/owners:
    post:
      summary: "オーナー登録"
      tags:
        - "オーナー管理"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnerRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
        "400":
          description: "バリデーションエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "メールアドレス重複"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
  /api/v1/terms:
    get:
      summary: "利用規約取得"
      tags:
        - "オーナー管理"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TermsResponse"
      security:
        - bearerAuth: []
  /api/v1/owners/applications:
    post:
      summary: "オーナー申請提出"
      tags:
        - "オーナー管理"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationRequest"
      responses:
        "201":
          description: "申請成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "400":
          description: "バリデーションエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
  /api/v1/admin/owners/applications/{id}/review:
    put:
      summary: "オーナー申請審査"
      tags:
        - "オーナー管理"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApplicationRequest"
      responses:
        "200":
          description: "審査完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponse"
        "404":
          description: "申請が見つからない"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
  /api/v1/owners/me/withdraw:
    post:
      summary: "オーナー退会"
      tags:
        - "オーナー管理"
      responses:
        "200":
          description: "退会成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
        "400":
          description: "未精算の売上がある場合"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
  /api/v1/rooms:
    post:
      summary: "会議室登録"
      tags:
        - "会議室管理"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
        "400":
          description: "バリデーションエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
    get:
      summary: "会議室検索"
      tags:
        - "会議室予約"
      parameters:
        - name: location
          in: query
          schema:
            type: string
          description: "所在地"
        - name: min_price
          in: query
          schema:
            type: number
          description: "最低価格"
        - name: max_price
          in: query
          schema:
            type: number
          description: "最高価格"
        - name: capacity
          in: query
          schema:
            type: integer
          description: "収容人数"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたり件数"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
      security:
        - bearerAuth: []
  /api/v1/rooms/{id}/rules:
    put:
      summary: "運用ルール設定"
      tags:
        - "会議室管理"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRulesRequest"
      responses:
        "200":
          description: "設定成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesResponse"
      security:
        - bearerAuth: []
  /api/v1/rooms/{id}/reviews:
    get:
      summary: "会議室評価一覧取得"
      tags:
        - "評価管理"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations:
    post:
      summary: "会議室予約"
      tags:
        - "会議室予約"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: "予約成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "400":
          description: "バリデーションエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "時間帯が既に予約済み"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}:
    put:
      summary: "予約変更"
      tags:
        - "会議室予約"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationRequest"
      responses:
        "200":
          description: "変更成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}/cancel:
    post:
      summary: "予約取消"
      tags:
        - "会議室予約"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "取消成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}/approve:
    post:
      summary: "利用者使用許諾"
      tags:
        - "会議室貸出"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveReservationRequest"
      responses:
        "200":
          description: "許諾成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}/key/handover:
    post:
      summary: "鍵貸出"
      tags:
        - "会議室貸出"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "貸出成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}/key/return:
    post:
      summary: "鍵返却"
      tags:
        - "会議室貸出"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "返却成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}/user-reviews:
    post:
      summary: "利用者評価登録"
      tags:
        - "評価管理"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserReviewRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserReviewResponse"
      security:
        - bearerAuth: []
  /api/v1/reservations/{id}/room-reviews:
    post:
      summary: "会議室評価登録"
      tags:
        - "評価管理"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomReviewRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomReviewResponse"
      security:
        - bearerAuth: []
  /api/v1/inquiries:
    post:
      summary: "問合せ送信"
      tags:
        - "問合せ"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryRequest"
      responses:
        "201":
          description: "送信成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
      security:
        - bearerAuth: []
  /api/v1/inquiries/{id}/replies:
    post:
      summary: "問合せ回答"
      tags:
        - "問合せ"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReplyRequest"
      responses:
        "200":
          description: "回答成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
      security:
        - bearerAuth: []
  /api/v1/support/inquiries:
    post:
      summary: "サービス問合せ送信"
      tags:
        - "問合せ"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportInquiryRequest"
      responses:
        "201":
          description: "送信成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
      security:
        - bearerAuth: []
  /api/v1/admin/inquiries/{id}/replies:
    post:
      summary: "サービス問合せ回答"
      tags:
        - "問合せ"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReplyRequest"
      responses:
        "200":
          description: "回答成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
      security:
        - bearerAuth: []
  /api/v1/owners/me/usage-stats:
    get:
      summary: "利用実績取得"
      tags:
        - "利用実績"
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: "対象月 (YYYY-MM)"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageStatsResponse"
      security:
        - bearerAuth: []
  /api/v1/owners/me/revenue-stats:
    get:
      summary: "売上実績取得"
      tags:
        - "利用実績"
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: "対象月 (YYYY-MM)"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueStatsResponse"
      security:
        - bearerAuth: []
  /api/v1/owners/me/settlements:
    get:
      summary: "精算情報一覧取得"
      tags:
        - "精算"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementListResponse"
      security:
        - bearerAuth: []
  /api/v1/admin/settlements/execute:
    post:
      summary: "精算実行"
      tags:
        - "精算"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteSettlementRequest"
      responses:
        "200":
          description: "精算実行成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementExecutionResponse"
      security:
        - bearerAuth: []
  /api/v1/admin/commission-stats:
    get:
      summary: "手数料売上分析"
      tags:
        - "サービス運営"
      parameters:
        - name: axis
          in: query
          schema:
            type: string
            enum:
              - "room"
              - "rental"
          description: "分析軸(会議室別/貸出別)"
        - name: month
          in: query
          schema:
            type: string
          description: "対象月 (YYYY-MM)"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionStatsResponse"
      security:
        - bearerAuth: []
  /api/v1/admin/usage-history:
    get:
      summary: "利用履歴一覧取得"
      tags:
        - "サービス運営"
      parameters:
        - name: axis
          in: query
          schema:
            type: string
            enum:
              - "user"
              - "room"
          description: "分析軸(会員別/物件別)"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageHistoryListResponse"
      security:
        - bearerAuth: []
  /api/v1/admin/usage-analytics:
    get:
      summary: "利用状況分析"
      tags:
        - "サービス運営"
      parameters:
        - name: axis
          in: query
          schema:
            type: string
            enum:
              - "user"
              - "room"
          description: "分析軸(会員別/物件別)"
        - name: month
          in: query
          schema:
            type: string
          description: "対象月 (YYYY-MM)"
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageAnalyticsResponse"
      security:
        - bearerAuth: []
components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "エラーコード"
        message:
          type: string
          description: "エラーメッセージ"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    CreateOwnerRequest:
      type: object
      required:
        - name
        - email
        - phone
      properties:
        name:
          type: string
          description: "氏名"
        email:
          type: string
          format: email
          description: "メールアドレス"
        phone:
          type: string
          description: "電話番号"
        profile:
          type: string
          description: "プロフィール"
    OwnerResponse:
      type: object
      required:
        - owner_id
        - name
        - status
      properties:
        owner_id:
          type: string
          description: "オーナーID"
        name:
          type: string
          description: "氏名"
        email:
          type: string
          description: "メールアドレス"
        status:
          type: string
          description: "オーナー状態"
          enum:
            - "申請中"
            - "審査中"
            - "承認済"
            - "却下"
            - "退会"
    TermsResponse:
      type: object
      properties:
        content:
          type: string
          description: "規約本文"
        version:
          type: string
          description: "規約バージョン"
    CreateApplicationRequest:
      type: object
      properties:
        terms_confirmed:
          type: boolean
          description: "規約確認済みフラグ"
    ApplicationResponse:
      type: object
      properties:
        application_id:
          type: string
          description: "申請ID"
        owner_id:
          type: string
          description: "オーナーID"
        review_result:
          type: string
          description: "審査結果"
    ReviewApplicationRequest:
      type: object
      required:
        - result
      properties:
        result:
          type: string
          enum:
            - "approved"
            - "rejected"
          description: "審査結果"
        rejection_reason:
          type: string
          description: "却下理由(却下時必須)"
    CreateRoomRequest:
      type: object
      required:
        - room_name
        - location
        - size
        - price
      properties:
        room_name:
          type: string
          description: "会議室名"
        location:
          type: string
          description: "所在地"
        size:
          type: string
          description: "広さ"
        price:
          type: number
          description: "価格(円/時間)"
        functionality:
          type: string
          description: "機能性"
    RoomResponse:
      type: object
      properties:
        room_id:
          type: string
          description: "会議室ID"
        room_name:
          type: string
          description: "会議室名"
        location:
          type: string
          description: "所在地"
        price:
          type: number
          description: "価格"
        status:
          type: string
          description: "会議室状態"
    RoomListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoomResponse"
        total:
          type: integer
          description: "総件数"
        page:
          type: integer
          description: "現在ページ"
        per_page:
          type: integer
          description: "1ページあたり件数"
    UpdateRulesRequest:
      type: object
      required:
        - cancellation_policy
        - availability
        - min_usage_time
      properties:
        cancellation_policy:
          type: string
          description: "キャンセルポリシー"
        availability:
          type: boolean
          description: "貸出可否"
        min_usage_time:
          type: integer
          minimum: 1
          description: "最低利用時間(分)"
    RulesResponse:
      type: object
      properties:
        rule_id:
          type: string
          description: "ルールID"
        room_id:
          type: string
          description: "会議室ID"
        cancellation_policy:
          type: string
          description: "キャンセルポリシー"
        availability:
          type: boolean
          description: "貸出可否"
    ReviewListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoomReviewResponse"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
    CreateReservationRequest:
      type: object
      required:
        - room_id
        - start_at
        - end_at
        - payment_method
      properties:
        room_id:
          type: string
          description: "会議室ID"
        start_at:
          type: string
          format: date-time
          description: "利用開始日時"
        end_at:
          type: string
          format: date-time
          description: "利用終了日時"
        payment_method:
          type: string
          enum:
            - "credit_card"
            - "e_money"
          description: "決済方法"
    ReservationResponse:
      type: object
      properties:
        reservation_id:
          type: string
          description: "予約ID"
        room_id:
          type: string
          description: "会議室ID"
        status:
          type: string
          description: "予約状態"
          enum:
            - "予約申請中"
            - "予約確定"
            - "変更中"
            - "取消済"
            - "利用済"
    UpdateReservationRequest:
      type: object
      properties:
        start_at:
          type: string
          format: date-time
          description: "利用開始日時"
        end_at:
          type: string
          format: date-time
          description: "利用終了日時"
    ApproveReservationRequest:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
          description: "許諾可否"
        rejection_reason:
          type: string
          description: "拒否理由(拒否時)"
    KeyResponse:
      type: object
      properties:
        key_id:
          type: string
          description: "鍵ID"
        status:
          type: string
          description: "鍵状態"
          enum:
            - "保管中"
            - "貸出中"
            - "返却済"
    CreateUserReviewRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: "評価点"
        comment:
          type: string
          description: "コメント"
