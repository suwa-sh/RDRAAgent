uc: "オーナーを登録する"
business: "オーナー管理業務"
buc: "オーナー登録フロー"
endpoints:
  - method: "POST"
    path: "/api/v1/owners"
    summary: "オーナー登録"
    request_schema: "CreateOwnerRequest"
    response_schema: "OwnerResponse"
    tags:
      - "オーナー登録フロー"
schemas:
  - name: "CreateOwnerRequest"
    properties:
      - name: "name"
        type: "string"
        required: true
      - name: "email"
        type: "string"
        required: true
      - name: "phone"
        type: "string"
        required: true
      - name: "profile"
        type: "string"
        required: false
  - name: "OwnerResponse"
    properties:
      - name: "owner_id"
        type: "string"
        required: true
      - name: "status"
        type: "string"
        required: true
