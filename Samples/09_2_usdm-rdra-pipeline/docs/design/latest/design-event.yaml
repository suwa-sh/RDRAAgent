      - "Button"
      - "StepTracker"
  - name: "規約確認画面"
    portal: "owner"
    route: "/register/terms"
    components:
      - "Card"
      - "Button"
  - name: "オーナー申請画面"
    portal: "owner"
    route: "/register/apply"
