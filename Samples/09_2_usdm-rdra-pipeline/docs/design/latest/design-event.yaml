components:
  ui:
    - name: "Button"
      variants:
        - "default"
        - "secondary"
        - "outline"
        - "ghost"
        - "destructive"
      sizes:
        - "sm"
        - "md"
        - "lg"
    - name: "Badge"
      variants:
        - "default"
        - "success"
        - "warning"
        - "destructive"
        - "info"
        - "outline"
    - name: "Card"
      variants:
        - "default"
        - "hoverable"
    - name: "Input"
      variants:
        - "default"
        - "error"
    - name: "Icon"
      variants: []
  domain:
    - name: "RoomCard"
      description: "会議室情報をカード形式で表示。画像、名前、所在地、価格、評価を含む"
      screens:
        - "会議室検索画面"
      props:
        - "roomName"
        - "location"
        - "price"
        - "rating"
        - "capacity"
        - "imageUrl"
      variants:
        - "grid"
        - "list"
    - name: "SearchFilter"
      description: "会議室検索用フィルター。所在地、価格帯、収容人数、設備で絞り込む"
      screens:
        - "会議室検索画面"
      props:
        - "location"
        - "priceRange"
        - "capacity"
        - "equipment"
    - name: "BookingCalendar"
      description: "予約日時を選択するカレンダー。空き状況を表示"
      screens:
        - "会議室予約画面"
      props:
        - "selectedDate"
        - "availableSlots"
        - "onDateSelect"
    - name: "ReservationCard"
      description: "予約情報を表示するカード。予約状態、日時、会議室名を含む"
      screens:
        - "利用者許諾画面"
        - "予約変更画面"
        - "予約取消画面"
      props:
        - "reservationId"
        - "roomName"
        - "dateTime"
        - "status"
        - "userName"
    - name: "StarRating"
      description: "星評価の表示と入力。SVGベースで1〜5の評価をサポート"
      screens:
        - "評価登録画面"
        - "会議室評価一覧画面"
        - "会議室検索画面"
      props:
        - "value"
        - "max"
        - "readonly"
        - "onRate"
    - name: "StatusBadge"
      description: "各種ステータスをBadge形式で表示。状態モデルと色のマッピングを内包"
      screens:
        - "全画面で横断利用"
      props:
        - "status"
        - "model"
    - name: "StepTracker"
      description: "状態遷移のステップ表示。現在のステップを強調表示"
      screens:
        - "予約詳細"
        - "オーナー詳細"
      props:
        - "steps"
        - "currentStep"
    - name: "PriceDisplay"
      description: "金額を日本円形式でフォーマット表示。割引価格の打ち消し線表示に対応"
      screens:
        - "会議室予約画面"
        - "精算確認画面"
        - "売上実績確認画面"
      props:
        - "amount"
        - "originalAmount"
        - "size"
    - name: "InquiryThread"
      description: "問合せのスレッド表示。送信者と回答をタイムライン形式で表示"
      screens:
        - "問合せ送信画面"
        - "問合せ回答画面"
        - "サービス問合せ画面"
        - "サービス問合せ対応画面"
      props:
        - "messages"
        - "onSend"
    - name: "SummaryCard"
      description: "集計データをサマリー表示。指標名、値、前期比を含む"
      screens:
        - "手数料売上分析画面"
        - "利用実績確認画面"
        - "売上実績確認画面"
        - "利用状況分析画面"
      props:
        - "label"
        - "value"
        - "change"
        - "trend"

screens:
  - name: "会議室検索画面"
    portal: "user"
    route: "/rooms/search"
    components:
      - "SearchFilter"
      - "RoomCard"
      - "StarRating"
  - name: "会議室予約画面"
    portal: "user"
    route: "/rooms/:id/reserve"
    components:
      - "BookingCalendar"
      - "PriceDisplay"
      - "Button"
  - name: "予約変更画面"
    portal: "user"
    route: "/reservations/:id/edit"
    components:
      - "ReservationCard"
      - "BookingCalendar"
      - "Button"
  - name: "予約取消画面"
    portal: "user"
    route: "/reservations/:id/cancel"
    components:
      - "ReservationCard"
      - "Button"
  - name: "評価登録画面"
    portal: "user"
    route: "/reservations/:id/review"
    components:
      - "StarRating"
      - "Input"
      - "Button"
  - name: "問合せ送信画面"
    portal: "user"
