  - name: "利用履歴管理画面"
    portal: "admin"
    route: "/analytics/history"
    components:
      - "Card"
      - "StatusBadge"
  - name: "利用状況分析画面"
    portal: "admin"
    route: "/analytics/usage"
    components:
      - "SummaryCard"
      - "Card"
  - name: "サービス問合せ対応画面"
    portal: "admin"
    route: "/inquiries/:id"
    components:
      - "InquiryThread"
      - "Input"
      - "Button"
  - name: "精算実行画面"
    portal: "admin"
    route: "/settlements/execute"
    components:
      - "PriceDisplay"
      - "StatusBadge"
      - "Button"

states:
  - model: "オーナー状態"
    entries:
      - state: "未登録"
        label: "未登録"
        color: "gray"
      - state: "申請中"
        label: "申請中"
        color: "blue"
      - state: "審査中"
        label: "審査中"
        color: "amber"
      - state: "承認済"
        label: "承認済"
        color: "green"
      - state: "却下"
        label: "却下"
        color: "red"
      - state: "退会"
        label: "退会"
        color: "gray"
  - model: "予約状態"
    entries:
      - state: "予約申請中"
        label: "予約申請中"
        color: "blue"
      - state: "予約確定"
        label: "予約確定"
        color: "green"
      - state: "変更中"
        label: "変更中"
        color: "amber"
      - state: "取消済"
        label: "取消済"
        color: "red"
      - state: "利用済"
        label: "利用済"
        color: "gray"
  - model: "鍵状態"
    entries:
      - state: "保管中"
        label: "保管中"
        color: "gray"
      - state: "貸出中"
        label: "貸出中"
        color: "amber"
      - state: "返却済"
        label: "返却済"
        color: "green"
  - model: "会議室利用状態"
    entries:
      - state: "利用前"
        label: "利用前"
        color: "gray"
      - state: "利用中"
        label: "利用中"
        color: "blue"
      - state: "利用終了"
        label: "利用終了"
        color: "green"
  - model: "会議室状態"
    entries:
      - state: "未公開"
        label: "未公開"
        color: "gray"
      - state: "公開中"
        label: "公開中"
        color: "green"
      - state: "貸出停止"
        label: "貸出停止"
        color: "red"

nfr_decisions:
  - nfr: "可用性 A.1.1.1 (9時〜翌8時運用)"
    decision: "全画面にエラー状態・ローディング状態（Skeleton UI）を実装"
  - nfr: "性能 B.2.1.1 (レスポンスタイム)"
    decision: "Skeleton UI でパーシーブドパフォーマンス改善、ページネーション対応"
  - nfr: "セキュリティ E.5.2.1 (RBAC)"
    decision: "ポータル別ナビゲーション・権限ベース表示切替"
  - nfr: "セキュリティ E.6.1.1 (暗号化)"
    decision: "PII マスク表示（カード番号、電話番号）"
  - nfr: "運用 F.1.1.2 (モバイル対応)"
    decision: "User ポータルをモバイルファースト設計、レスポンシブ対応"

