      - "Button"
      - "StepTracker"
  - name: "オーナー退会画面"
    portal: "owner"
    route: "/settings/withdraw"
    components:
      - "Card"
      - "Button"
  - name: "会議室登録画面"
    portal: "owner"
    route: "/rooms/new"
    components:
      - "Input"
      - "Button"
  - name: "運用ルール設定画面"
    portal: "owner"
    route: "/rooms/:id/rules"
    components:
      - "Input"
      - "Button"
      - "Card"
  - name: "会議室評価一覧画面"
    portal: "owner"
    route: "/rooms/:id/reviews"
    components:
      - "StarRating"
      - "Card"
  - name: "利用者許諾画面"
    portal: "owner"
    route: "/reservations/:id/approve"
    components:
      - "ReservationCard"
      - "StarRating"
      - "StatusBadge"
      - "Button"
  - name: "鍵管理画面"
    portal: "owner"
    route: "/reservations/:id/key"
    components:
      - "StatusBadge"
      - "Button"
  - name: "鍵返却画面"
    portal: "owner"
    route: "/reservations/:id/key-return"
    components:
      - "StatusBadge"
      - "Button"
  - name: "利用者評価登録画面"
    portal: "owner"
    route: "/reservations/:id/rate-user"
    components:
      - "StarRating"
      - "Input"
      - "Button"
  - name: "問合せ回答画面"
    portal: "owner"
    route: "/inquiries/:id/reply"
