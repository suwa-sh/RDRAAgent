version: "1.0"
event_id: "20260330_150443_initial_build"
created_at: "2026-03-30T15:04:43"
source: "初期要望.txt"
system_name: "貸し会議室サービス"

requirements:
  - id: "REQ-001"
    requirement: "会議室オーナーがオーナーとして登録・管理できること"
    reason: "貸し会議室サービスにおいて、会議室を提供するオーナーの登録・プロフィール管理・申請・退会のライフサイクルを管理する必要があるため"
    priority: "must"
    specifications:
      - id: "SPEC-001-01"
        specification: "オーナー登録機能を提供し、プロフィール情報を登録できるようにする"
        acceptance_criteria:
          - "Given 未登録ユーザー When オーナー登録画面でプロフィール情報を入力して登録する Then オーナーとして登録され、プロフィールが保存される"
        affected_models:
          - type: "actor"
            action: "add"
            target: "会議室オーナー"
          - type: "information"
            action: "add"
            target: "オーナー情報"
          - type: "buc"
            action: "add"
            target: "オーナー管理"
      - id: "SPEC-001-02"
        specification: "規約参照を確認し、オーナー申請を行う機能を提供する"
        acceptance_criteria:
          - "Given 登録済みオーナー When 規約を確認して申請する Then オーナー申請がサービス運営担当者に送られる"
        affected_models:
          - type: "information"
            action: "add"
            target: "オーナー申請"
          - type: "state"
            action: "add"
            target: "オーナー申請状態"
      - id: "SPEC-001-03"
        specification: "オーナー退会機能を提供する"
        acceptance_criteria:
          - "Given 登録済みオーナー When 退会を申請する Then オーナーアカウントが退会状態となる"
        affected_models:
          - type: "state"
            action: "add"
            target: "オーナー状態"

  - id: "REQ-002"
    requirement: "会議室オーナーが会議室を登録・管理できること"
    reason: "オーナーが所有する会議室の物件情報や運用ルールを登録し、貸出可能な状態にするため"
    priority: "must"
    specifications:
      - id: "SPEC-002-01"
        specification: "会議室の物件情報（広さ、価格、機能性）を登録できるようにする"
        acceptance_criteria:
          - "Given 登録済みオーナー When 会議室情報（広さ、価格、機能性）を入力して登録する Then 会議室が登録され物件情報が保存される"
        affected_models:
          - type: "information"
            action: "add"
            target: "会議室情報"
          - type: "buc"
            action: "add"
            target: "会議室管理"
      - id: "SPEC-002-02"
        specification: "運用ルール（キャンセルポリシー、貸出可否）を設定できるようにする"
        acceptance_criteria:
          - "Given 登録済み会議室 When 運用ルールを設定する Then キャンセルポリシーと貸出可否が保存される"
        affected_models:
          - type: "information"
            action: "add"
            target: "運用ルール"
          - type: "condition"
            action: "add"
            target: "キャンセルポリシー"
      - id: "SPEC-002-03"
        specification: "会議室の評価を確認できるようにする"
        acceptance_criteria:
          - "Given 登録済み会議室 When 評価一覧画面を開く Then 利用者からの会議室評価が表示される"
        affected_models:
          - type: "information"
            action: "add"
            target: "会議室評価"

  - id: "REQ-003"
    requirement: "会議室オーナーが会議室を貸出できること"
    reason: "利用者に会議室を貸し出し、鍵の受け渡しや利用者の許諾・評価を行うため"
    priority: "must"
    specifications:
      - id: "SPEC-003-01"
        specification: "利用者の使用許諾（過去の利用評価の確認）を行い、貸出可否を判断できるようにする"
        acceptance_criteria:
          - "Given 予約申請があった When オーナーが利用者の過去評価を確認する Then 貸出可否を判断して許諾または拒否できる"
        affected_models:
          - type: "buc"
            action: "add"
            target: "会議室貸出管理"
          - type: "condition"
            action: "add"
            target: "利用者許諾条件"
          - type: "information"
            action: "add"
            target: "利用者評価"
      - id: "SPEC-003-02"
        specification: "会議室の鍵を貸し出す機能を提供する"
        acceptance_criteria:
          - "Given 許諾済みの予約 When 利用開始時にオーナーが鍵を渡す Then 鍵の貸出が記録される"
        affected_models:
          - type: "information"
            action: "add"
            target: "鍵"
          - type: "state"
            action: "add"
            target: "鍵状態"
      - id: "SPEC-003-03"
        specification: "利用者の評価をオーナーが登録できるようにする"
        acceptance_criteria:
          - "Given 利用終了後 When オーナーが利用者の評価を入力する Then 利用者評価が保存される"
        affected_models:
          - type: "information"
            action: "add"
            target: "利用者評価"
      - id: "SPEC-003-04"
        specification: "利用者からの問合せにオーナーが回答できるようにする"
        acceptance_criteria:
          - "Given 利用者から問合せがあった When オーナーが回答を入力する Then 回答が利用者に送信される"
        affected_models:
          - type: "information"
            action: "add"
            target: "問合せ"
          - type: "buc"
            action: "add"
            target: "問合せ管理"

  - id: "REQ-004"
    requirement: "会議室オーナーが利用実績を管理できること"
    reason: "会議室の利用状況と売上実績を把握し、収益管理を行うため"
    priority: "must"
    specifications:
      - id: "SPEC-004-01"
        specification: "会議室の利用者からの評価を確認できるようにする"
        acceptance_criteria:
          - "Given 利用実績がある会議室 When オーナーが利用実績画面を開く Then 会議室評価と利用履歴が表示される"
        affected_models:
          - type: "buc"
            action: "add"
            target: "利用実績管理"
          - type: "information"
            action: "add"
            target: "利用実績"
      - id: "SPEC-004-02"
        specification: "売上実績を管理できるようにする"
        acceptance_criteria:
          - "Given 利用実績がある会議室 When オーナーが売上管理画面を開く Then 売上実績が表示される"
        affected_models:
          - type: "information"
            action: "add"
            target: "売上実績"

  - id: "REQ-005"
    requirement: "サービス運営担当者がサービスを運営管理できること"
    reason: "貸し会議室サービスの手数料売上分析、オーナー登録審査、運用管理を行うため"
    priority: "must"
    specifications:
      - id: "SPEC-005-01"
        specification: "手数料売上を会議室別・貸出別に分析できるようにする"
        acceptance_criteria:
          - "Given 利用実績データがある When 売上分析画面を開く Then 会議室別・貸出別の手数料売上が表示される"
        affected_models:
          - type: "actor"
            action: "add"
            target: "サービス運営担当者"
          - type: "buc"
            action: "add"
            target: "サービス運営管理"
          - type: "information"
            action: "add"
            target: "手数料売上"
      - id: "SPEC-005-02"
        specification: "オーナー登録の審査機能を提供する"
        acceptance_criteria:
          - "Given オーナー申請がある When サービス運営担当者が審査する Then 承認または却下の結果が記録される"
        affected_models:
          - type: "buc"
            action: "add"
            target: "オーナー審査管理"
          - type: "state"
            action: "add"
            target: "オーナー審査状態"

  - id: "REQ-006"
    requirement: "サービス運営担当者が利用状況を管理できること"
    reason: "会員別・物件別の利用履歴管理と会議室利用状況分析を行い、サービス改善に活かすため"
    priority: "must"
    specifications:
      - id: "SPEC-006-01"
        specification: "利用履歴を会員別・物件別に管理できるようにする"
        acceptance_criteria:
          - "Given 利用履歴データがある When 利用履歴管理画面を開く Then 会員別・物件別の利用履歴が表示される"
        affected_models:
          - type: "buc"
            action: "add"
            target: "利用状況管理"
          - type: "information"
            action: "add"
            target: "利用履歴"
      - id: "SPEC-006-02"
        specification: "会議室利用状況を分析できるようにする"
        acceptance_criteria:
          - "Given 利用データがある When 利用状況分析画面を開く Then 会議室の利用状況分析結果が表示される"
        affected_models:
          - type: "information"
            action: "add"
            target: "利用状況分析"

  - id: "REQ-007"
    requirement: "サービス運営担当者が問合せを管理できること"
    reason: "利用者からのサービス問合せに対応し、サービス品質を維持するため"
    priority: "must"
    specifications:
      - id: "SPEC-007-01"
        specification: "利用者からのサービス問合せ対応機能を提供する"
        acceptance_criteria:
          - "Given 利用者からサービス問合せがある When サービス運営担当者が対応する Then 問合せへの回答が記録・送信される"
        affected_models:
          - type: "buc"
            action: "add"
            target: "問合せ管理"

  - id: "REQ-008"
    requirement: "サービス運営担当者が会議室オーナーへの精算を行えること"
    reason: "会議室別の利用履歴に基づき、オーナーへの精算額を算出し支払いを行うため"
    priority: "must"
    specifications:
      - id: "SPEC-008-01"
        specification: "会議室別の利用履歴からオーナーへの精算額を算出し支払いを行う"
        acceptance_criteria:
          - "Given 月末の精算タイミング When 精算処理を実行する Then 会議室別の利用履歴から精算額が算出され、オーナーに支払われる"
        affected_models:
          - type: "buc"
            action: "add"
            target: "オーナー精算管理"
          - type: "information"
            action: "add"
            target: "精算情報"
          - type: "external_system"
            action: "add"
            target: "決済機関"

  - id: "REQ-009"
    requirement: "利用者が貸会議室を予約できること"
    reason: "利用者が条件に合った会議室を検索・比較し、予約・決済できるようにするため"
    priority: "must"
    specifications:
      - id: "SPEC-009-01"
        specification: "会議室を広さ・価格・機能性・評価で照会できるようにする"
        acceptance_criteria:
          - "Given 利用者がログイン済み When 会議室検索条件を入力して検索する Then 条件に合致する会議室一覧が表示される"
        affected_models:
          - type: "actor"
            action: "add"
            target: "利用者"
          - type: "buc"
            action: "add"
            target: "会議室予約管理"
          - type: "variation"
            action: "add"
            target: "検索条件バリエーション"
      - id: "SPEC-009-02"
        specification: "会議室を予約し、決済方法（クレジットカード、電子マネー）を設定できるようにする"
        acceptance_criteria:
          - "Given 利用者が会議室を選択 When 予約情報と決済方法を入力して予約する Then 予約が確定し決済方法が登録される"
        affected_models:
          - type: "information"
            action: "add"
            target: "予約情報"
          - type: "variation"
            action: "add"
            target: "決済方法バリエーション"
          - type: "state"
            action: "add"
            target: "予約状態"
      - id: "SPEC-009-03"
        specification: "予約の変更・取消ができるようにする"
        acceptance_criteria:
          - "Given 予約済みの利用者 When 予約変更または取消を行う Then 予約が変更または取消される"
        affected_models:
          - type: "state"
            action: "add"
            target: "予約状態"
      - id: "SPEC-009-04"
        specification: "会議室オーナーへの問合せができるようにする"
        acceptance_criteria:
          - "Given 利用者が会議室詳細画面にいる When 問合せを入力して送信する Then オーナーに問合せが送信される"
        affected_models:
          - type: "information"
            action: "add"
            target: "問合せ"

  - id: "REQ-010"
    requirement: "利用者が利用した会議室の評価を登録できること"
    reason: "利用後の会議室とホストの評価を登録し、他の利用者の参考にするため"
    priority: "must"
    specifications:
      - id: "SPEC-010-01"
        specification: "利用した会議室とそのホスト（オーナー）の評価を登録できるようにする"
        acceptance_criteria:
          - "Given 利用済みの予約がある When 利用者が評価を入力して登録する Then 会議室評価とホスト評価が保存される"
        affected_models:
          - type: "buc"
            action: "add"
            target: "評価管理"
          - type: "information"
            action: "add"
            target: "会議室評価"

  - id: "REQ-011"
    requirement: "支払と精算のサービスポリシーが定義されていること"
    reason: "予約時の決済手段登録、利用後の引き落とし、月末のオーナーへの支払いという精算フローを明確にするため"
    priority: "must"
    specifications:
      - id: "SPEC-011-01"
        specification: "会議室の予約時に決済手段を登録し、利用後にサービス運営者が利用料を引き落とし、月末にオーナーに利用料を支払うポリシーを定義する"
        acceptance_criteria:
          - "Given 予約時 When 利用者が決済手段を登録する Then 決済手段が予約に紐づけられる"
          - "Given 利用後 When サービス運営者が引き落としを実行する Then 利用料がサービス運営者に引き落とされる"
          - "Given 月末 When 精算処理を実行する Then オーナーに利用料が支払われる"
        affected_models:
          - type: "business_policy"
            action: "add"
            target: "支払と精算ポリシー"
          - type: "information"
            action: "add"
            target: "決済情報"

  - id: "REQ-012"
    requirement: "会議室利用のサービスポリシーが定義されていること"
    reason: "利用者が会議室に行き鍵を受け取って利用開始、返却して利用終了という利用フローを明確にするため"
    priority: "must"
    specifications:
      - id: "SPEC-012-01"
        specification: "利用者が会議室に行きオーナーから鍵を受取り、鍵受取で利用開始、会議後に鍵返却で利用終了とするポリシーを定義する"
        acceptance_criteria:
          - "Given 利用者が会議室に到着 When オーナーから鍵を受け取る Then 会議室の利用が開始される"
          - "Given 会議終了後 When 利用者が鍵を返却する Then 会議室の利用が終了する"
        affected_models:
          - type: "business_policy"
            action: "add"
            target: "会議室利用ポリシー"
          - type: "state"
            action: "add"
            target: "会議室利用状態"
