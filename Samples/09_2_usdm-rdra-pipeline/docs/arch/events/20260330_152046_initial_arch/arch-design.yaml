app_architecture:
  tier_layers:
    - tier_id: "tier-frontend"
      layers:
        - id: "L-frontend-view"
          name: "ビュー層"
          responsibility: "UI コンポーネント、画面レイアウト、ユーザー操作の受付"
          allowed_dependencies:
            - "L-frontend-state"
          policies:
            - id: "LP-001"
              name: "コンポーネント設計"
              description: "再利用可能な UI コンポーネントを設計し、アクター別画面で共有する"
              reason: "3アクター向けの画面で共通 UI パーツを再利用するため"
              source_model: "アクター: 利用者, 会議室オーナー, サービス運営担当者"
              confidence: "medium"
          rules: []
        - id: "L-frontend-state"
          name: "状態管理層"
          responsibility: "アプリケーション状態管理、API 呼び出しの抽象化"
          allowed_dependencies:
            - "L-frontend-api-client"
          policies: []
          rules: []
        - id: "L-frontend-api-client"
          name: "API クライアント層"
          responsibility: "Backend API との通信、リクエスト/レスポンスの型変換"
          allowed_dependencies: []
          policies:
            - id: "LP-002"
              name: "冪等キー・トレースID付与"
              description: "状態変更リクエストに冪等キー、全リクエストに trace_id を HTTP ヘッダーで付与する"
              reason: "重複送信防止とトレーサビリティ確保のため"
              source_model: "BUC: 会議室予約フロー, NFR C.1.3.1"
              confidence: "high"
          rules: []
      cross_layer_policies:
        - id: "CLP-001"
          name: "IF なし（直接依存）"
          description: "レイヤー間は直接依存とし、開発スピードを優先する"
          reason: "新規構築のため IF による疎結合化は過剰"
          source_model: "なし"
          confidence: "default"
      cross_layer_rules:
        - id: "CLR-001"
          name: "エラーハンドリング"
          description: "API エラーは api-client 層でキャッチし、state 層でユーザー向けメッセージに変換し、view 層で表示する"
          reason: "レイヤー責務の分離"
          source_model: "なし"
          confidence: "default"
      diagram_mermaid: |
        graph TD
          V[view] --> S[state]
          S --> AC[api-client]
    - tier_id: "tier-backend-api"
      layers:
        - id: "L-backend-api-presentation"
          name: "プレゼンテーション層"
          responsibility: "HTTP リクエスト/レスポンスの変換、入力バリデーション、アクセスログ出力"
          allowed_dependencies:
            - "L-backend-api-usecase"
          policies:
            - id: "LP-003"
              name: "入力バリデーション"
              description: "API 境界で全入力をバリデーションする"
              reason: "外部入力の安全性確保"
              source_model: "条件: キャンセルポリシー, 精算ルール, 利用者許諾条件, オーナー審査基準"
              confidence: "high"
            - id: "LP-004"
              name: "アクセスログ"
              description: "HTTP リクエスト/レスポンスのメタデータを構造化ログで出力する。trace_id を発行し後続レイヤーに伝播する"
              reason: "アプリケーション監視と不正アクセス検知のため"
              source_model: "NFR C.1.3.1, NFR E.7.1.1"
              confidence: "medium"
          rules: []
        - id: "L-backend-api-usecase"
          name: "ユースケース層"
          responsibility: "ビジネスフロー制御、トランザクション境界、監査ログ出力"
          allowed_dependencies:
            - "L-backend-api-domain"
            - "L-backend-api-gateway"
          policies:
            - id: "LP-005"
              name: "トランザクション整合性"
              description: "金銭処理のトランザクション整合性を保証する。決済・精算に関わる操作は単一トランザクション内で完結させる"
              reason: "予約・決済・精算で金銭取引の整合性が必須のため"
              source_model: "情報: 決済情報, 精算情報, 予約情報"
              confidence: "high"
            - id: "LP-006"
              name: "監査ログ"
              description: "状態遷移を伴うビジネスイベントを構造化ログで記録する（誰が、何を、どうしたか）"
              reason: "金銭取引・個人情報操作の監査証跡を確保するため"
              source_model: "NFR E.7.1.1, 状態: 予約状態, オーナー状態"
              confidence: "high"
          rules: []
        - id: "L-backend-api-domain"
          name: "ドメイン層"
          responsibility: "ビジネスルール、エンティティ、値オブジェクト、ドメインイベント。状態遷移の整合性保証"
          allowed_dependencies: []
          policies:
            - id: "LP-007"
              name: "状態遷移"
              description: "ドメインモデル内で状態整合性を保証する。許可されていない状態遷移を拒否する"
              reason: "オーナー状態（6遷移）、予約状態（7遷移）、鍵状態（3遷移）、会議室利用状態（2遷移）、会議室状態（3遷移）の複雑な状態遷移があるため"
              source_model: "状態: オーナー状態, 予約状態, 鍵状態, 会議室利用状態, 会議室状態"
              confidence: "high"
            - id: "LP-008"
              name: "ログ出力禁止"
              description: "domain 層は直接ログ出力を行わない。ドメインイベントの発行または例外のスローで状態変化を通知する"
              reason: "domain 層の純粋性を保つため"
              source_model: "なし"
              confidence: "high"
          rules: []
        - id: "L-backend-api-gateway"
          name: "ゲートウェイ層"
          responsibility: "データストアアクセス、外部システム連携、MQ 発行。イベント追記+スナップショット更新の二重書き込みを隠蔽"
          allowed_dependencies:
            - "L-backend-api-domain"
          policies:
            - id: "LP-009"
              name: "外部連携冪等性"
              description: "外部呼出し（決済機関）の冪等性を保証する"
              reason: "金銭取引の重複処理を防止するため"
              source_model: "外部システム: 決済機関, BUC: オーナー精算フロー"
              confidence: "high"
            - id: "LP-010"
              name: "依存関係ログ"
              description: "外部 DB/API 呼び出しの開始・終了、処理時間、成否を構造化ログで出力する"
              reason: "外部システム連携のトレーサビリティ確保のため"
              source_model: "NFR C.1.3.1, 外部システム: 決済機関"
              confidence: "medium"
            - id: "LP-011"
              name: "イベント+スナップショット二重書き込み"
              description: "event_snapshot 型エンティティでは、イベント追記とスナップショット更新を1トランザクションで実行する"
              reason: "イミュータブルデータモデルの整合性を保つため"
              source_model: "状態: 予約状態, オーナー状態, 鍵状態, 会議室利用状態, 会議室状態"
              confidence: "high"
          rules: []
      cross_layer_policies:
        - id: "CLP-002"
          name: "IF なし（直接依存）"
          description: "レイヤー間は直接依存とし、開発スピードを優先する。外部サービス API 変更や DB 製品乗り換え時に凹型（IF 導入）で依存を内側に向ける"
          reason: "新規構築のため IF による疎結合化は過剰。前提条件が崩れた場合に凹型へ移行"
          source_model: "なし"
          confidence: "default"
        - id: "CLP-003"
          name: "ロギング方針"
          description: "レイヤーごとに責務に応じたログカテゴリを出力する。presentation: アクセスログ、usecase: 監査ログ、domain: ログ出力禁止、gateway: 依存関係ログ"
          reason: "運用監視とトレーサビリティの確保のため"
          source_model: "NFR C.6.1.1, NFR C.6.1.2, NFR C.1.3.1"
          confidence: "medium"
      cross_layer_rules:
        - id: "CLR-002"
          name: "エラーハンドリング方針"
          description: "domain の例外は usecase でキャッチし、presentation で HTTP ステータスに変換する"
          reason: "レイヤー責務の分離"
          source_model: "なし"
          confidence: "default"
      diagram_mermaid: |
        graph TD
          P[presentation] --> U[usecase]
          U --> D[domain]
          U --> G[gateway]
          G --> D
    - tier_id: "tier-backend-worker"
      layers:
        - id: "L-worker-presentation"
          name: "プレゼンテーション層"
          responsibility: "MQ メッセージ/CronJob パラメータの受付、バリデーション"
          allowed_dependencies:
            - "L-worker-usecase"
          policies: []
          rules: []
        - id: "L-worker-usecase"
          name: "ユースケース層"
          responsibility: "バッチ処理フロー制御、トランザクション境界"
          allowed_dependencies:
            - "L-worker-domain"
            - "L-worker-gateway"
          policies:
            - id: "LP-012"
              name: "バッチトランザクション"
              description: "精算バッチはオーナー単位でトランザクションを分離し、個別エラーが全体に波及しないようにする"
              reason: "月末精算処理の部分障害耐性を確保するため"
              source_model: "BUC: オーナー精算フロー, 条件: 精算ルール"
              confidence: "medium"
          rules: []
        - id: "L-worker-domain"
          name: "ドメイン層"
          responsibility: "精算ルール等のビジネスルール。Backend API と domain を共有する"
          allowed_dependencies: []
          policies: []
          rules: []
        - id: "L-worker-gateway"
          name: "ゲートウェイ層"
          responsibility: "データストアアクセス、外部システム（決済機関）連携"
          allowed_dependencies:
            - "L-worker-domain"
          policies: []
          rules: []
      cross_layer_policies:
        - id: "CLP-004"
          name: "IF なし（直接依存）"
          description: "レイヤー間は直接依存とし、開発スピードを優先する"
          reason: "新規構築のため IF による疎結合化は過剰"
          source_model: "なし"
          confidence: "default"
      cross_layer_rules:
        - id: "CLR-003"
          name: "エラーハンドリング方針"
          description: "domain の例外は usecase でキャッチし、presentation でエラーログ出力+リトライ判定を行う"
          reason: "レイヤー責務の分離"
          source_model: "なし"
          confidence: "default"
      diagram_mermaid: |
        graph TD
          P[presentation] --> U[usecase]
          U --> D[domain]
          U --> G[gateway]
          G --> D

