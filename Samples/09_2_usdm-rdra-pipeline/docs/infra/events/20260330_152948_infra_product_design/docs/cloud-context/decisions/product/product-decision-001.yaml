skill_type: "product"
artifact_id: "product-decision-001"
title: "コンピュートプラットフォーム選定: ECS Fargate vs EKS vs Lambda"
status: "accepted"
generated_at: "2026-03-30T15:32:40"
source_refs:
  - "aws-well-architected-framework"
inputs_ref:
  - "product-kashikaigishitsu-service-input"

decision:
  context: "バックエンド API とワーカーのコンピュートプラットフォームを選定する必要がある。arch-design では CaaS(k8s) が候補だが、チーム規模とワークロード特性に適したサービスを選定する"
  conflict_type: "capability"
  options:
    - id: "ecs-fargate"
      description: "Amazon ECS on Fargate: サーバレスコンテナオーケストレーション"
      pros:
        - "Kubernetes 運用負荷なし"
        - "Fargate でサーバ管理不要"
        - "ECS Service Auto Scaling が標準搭載"
        - "月末精算バッチは EventBridge + RunTask で CronJob 相当を実現"
        - "SQS 統合でワーカーパターンが容易"
      cons:
        - "Kubernetes エコシステム（Helm, Istio 等）が利用不可"
        - "細かいスケジューリング制御に制限あり"
    - id: "eks-fargate"
      description: "Amazon EKS on Fargate: マネージド Kubernetes"
      pros:
        - "arch-design の CaaS(k8s) 候補に完全適合"
        - "Kubernetes エコシステムのフル活用"
        - "CronJob ネイティブサポート"
      cons:
        - "EKS クラスタ管理コスト（$73/月固定）"
        - "Kubernetes 運用スキルが必要"
        - "BUC 7業務・baseline 50 RPS のワークロードにはオーバースペック"
    - id: "lambda"
      description: "AWS Lambda: サーバレス FaaS"
      pros:
        - "完全サーバレス"
        - "リクエスト単位の課金でコスト効率が高い（低トラフィック時）"
      cons:
        - "Hono フレームワークの制約（コールドスタート、実行時間15分上限）"
        - "月末精算バッチの8時間処理に対応不可"
        - "RDB 接続管理の複雑化（接続プール問題）"
  chosen_option: "ecs-fargate"
  rationale: "baseline 50 RPS、7 BUC のモノリシック API には ECS Fargate が最適。EKS は運用負荷とコストの観点で過剰。Lambda は精算バッチの実行時間制約に抵触する。arch-design の CaaS(k8s) 候補はベンダーニュートラルな表現であり、AWS では ECS Fargate がコスト・運用の両面で最適"
  risk_assessment: "将来的にマイクロサービス化する場合は EKS への移行を検討。ECS から EKS への移行はコンテナベースのため比較的容易"
  affected_elements:
    - "compute_api"
    - "compute_worker"
  review_date: "2027-03-30"
