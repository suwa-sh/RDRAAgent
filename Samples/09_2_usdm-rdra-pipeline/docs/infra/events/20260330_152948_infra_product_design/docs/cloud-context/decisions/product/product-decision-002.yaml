title: "データベース選定: RDS PostgreSQL vs Aurora PostgreSQL"
status: "accepted"
generated_at: "2026-03-30T15:32:40"
source_refs:
  - "aws-rds-postgresql"
inputs_ref:
  - "product-kashikaigishitsu-service-input"

decision:
  context: "プライマリデータベースとして PostgreSQL 互換の RDB を選定する。RDS 標準とAurora の2択"
  conflict_type: "capability"
  options:
    - id: "rds-postgresql"
      description: "Amazon RDS for PostgreSQL: 標準マネージド PostgreSQL"
      pros:
        - "コスト効率が高い（Aurora 比で約 20-30% 安価）"
        - "Multi-AZ で warm_standby フェイルオーバーに対応"
        - "PostgreSQL 完全互換"
        - "RPO 24h, RTO 4h の要件を十分に達成"
      cons:
        - "Aurora 比でフェイルオーバー時間が長い（60-120秒 vs 30秒以下）"
        - "ストレージの自動拡張範囲が限定的"
    - id: "aurora-postgresql"
      description: "Amazon Aurora PostgreSQL: 高性能マネージド PostgreSQL"
      pros:
        - "フェイルオーバー 30秒以下"
        - "最大15リードレプリカ"
        - "自動ストレージ拡張（最大128TB）"
      cons:
        - "コストが約 20-30% 高い"
        - "SLA 99% に対してはオーバースペック"
        - "baseline 50 RPS では Aurora の性能優位性が活きない"
  chosen_option: "rds-postgresql"
  rationale: "SLA 99%, baseline 50 RPS, RPO 24h のワークロード特性に対して RDS PostgreSQL が最適。Aurora の高性能・高可用性機能はコスト増に見合わない。将来的に SLA 向上やトラフィック増加が見込まれる場合は Aurora への移行を検討する"
  risk_assessment: "フェイルオーバー時間が 60-120秒。warm_standby 要件（60分未満）に対しては十分に余裕がある"
  affected_elements:
    - "database_primary"
  review_date: "2027-03-30"
