schema_version: "1.0"
artifact_type: "implementation_spec"
skill_type: "product"
artifact_id: "product-kashikaigishitsu-impl-aws"
title: "貸し会議室サービス AWS 実装仕様"
status: "draft"
generated_at: "2026-03-30T15:32:40"
source_refs:
  - "aws-well-architected-framework"
  - "aws-rds-postgresql"
  - "aws-elasticache-redis"
decision_refs:
  - "product-decision-001"
  - "product-decision-002"
  - "product-decision-003"
inputs_ref:
  - "product-kashikaigishitsu-workload-model"
  - "product-kashikaigishitsu-mapping-aws"

vendor: "aws"
canonical_ref: "product-kashikaigishitsu-workload-model"
mapping_ref: "product-kashikaigishitsu-mapping-aws"

components:
  - id: "comp-frontend"
    name: "フロントエンド（App Runner）"
    canonical_element_id: "compute_frontend"
    vendor_service: "AWS App Runner"
    configuration:
      instance_type: "1 vCPU / 2 GB"
      min_instances: 1
      max_instances: 4
      port: 3000
      health_check_path: "/api/health"
      auto_scaling:
        max_concurrency: 100
        min_size: 1
        max_size: 4
      environment:
        NODE_ENV: "production"
        API_BASE_URL: "https://api.example.com"
    dependencies:
      - "comp-cdn"
      - "comp-api-gateway"
    iac_module: "infra/product/aws/modules/app-runner"
    validation_rules:
      - rule: "health_check_returns_200"
        type: "runtime"
        description: "ヘルスチェックエンドポイントが 200 を返すこと"

  - id: "comp-cdn"
    name: "CDN（CloudFront）"
    canonical_element_id: "cdn"
    vendor_service: "Amazon CloudFront"
    configuration:
      price_class: "PriceClass_200"
      default_ttl: 86400
      min_ttl: 0
      max_ttl: 31536000
      compress: true
      viewer_protocol_policy: "redirect-to-https"
      origin: "App Runner"
      waf_acl: "comp-waf"
    dependencies:
      - "comp-frontend"
      - "comp-waf"
    iac_module: "infra/product/aws/modules/cloudfront"
    validation_rules:
      - rule: "https_enforced"
        type: "static"
        description: "HTTPS リダイレクトが有効であること"

  - id: "comp-waf"
    name: "WAF（AWS WAF）"
    canonical_element_id: "waf"
    vendor_service: "AWS WAF"
    configuration:
      managed_rules:
        - "AWSManagedRulesCommonRuleSet"
        - "AWSManagedRulesSQLiRuleSet"
        - "AWSManagedRulesKnownBadInputsRuleSet"
        - "AWSManagedRulesAmazonIpReputationList"
      rate_limit:
        limit: 2000
        evaluation_window: 300
      associated_resources:
        - "comp-api-gateway"
        - "comp-cdn"
    dependencies: []
    iac_module: "infra/product/aws/modules/waf"
    validation_rules:
      - rule: "managed_rules_active"
        type: "runtime"
        description: "マネージドルールが全てアクティブであること"

  - id: "comp-api-gateway"
    name: "API ゲートウェイ（API Gateway）"
    canonical_element_id: "api_gateway"
    vendor_service: "Amazon API Gateway"
    configuration:
      api_type: "REST"
      endpoint_type: "REGIONAL"
      authorization: "Lambda Authorizer (JWT)"
      throttle:
        burst_limit: 200
        rate_limit: 100
      stage: "v1"
      logging:
        access_logging: true
        execution_logging: true
        log_level: "INFO"
      vpc_link: true
      ip_restriction:
        admin_endpoints: true
        allowed_cidrs: []
    dependencies:
      - "comp-waf"
      - "comp-idp"
      - "comp-api-alb"
    iac_module: "infra/product/aws/modules/api-gateway"
    validation_rules:
      - rule: "jwt_authorizer_configured"
        type: "static"
        description: "Lambda Authorizer が JWT 検証を行うこと"

  - id: "comp-idp"
    name: "IdP（Cognito）"
    canonical_element_id: "idp"
    vendor_service: "Amazon Cognito"
    configuration:
      user_pool:
        mfa: "OPTIONAL"
        mfa_methods:
          - "TOTP"
          - "SMS"
        password_policy:
          min_length: 12
          require_uppercase: true
          require_lowercase: true
          require_numbers: true
          require_symbols: true
        token_validity:
          access_token: "1 hour"
          id_token: "1 hour"
          refresh_token: "30 days"
        custom_attributes:
          - name: "role"
            type: "String"
            mutable: true
      app_client:
        oauth_flows:
          - "code"
        callback_urls: []
        logout_urls: []
    dependencies: []
    iac_module: "infra/product/aws/modules/cognito"
    validation_rules:
      - rule: "mfa_enabled"
        type: "static"
        description: "MFA が有効であること"

  - id: "comp-api-alb"
    name: "内部 ALB"
    canonical_element_id: "compute_api"
    vendor_service: "Elastic Load Balancing (ALB)"
    configuration:
      scheme: "internal"
      target_type: "ip"
      health_check:
        path: "/healthz"
        interval: 30
        healthy_threshold: 2
        unhealthy_threshold: 3
      stickiness: false
      deregistration_delay: 30
    dependencies:
      - "comp-api"
    iac_module: "infra/product/aws/modules/alb"
    validation_rules:
      - rule: "health_check_configured"
        type: "static"
        description: "ヘルスチェックが設定されていること"

  - id: "comp-api"
    name: "バックエンド API（ECS Fargate）"
    canonical_element_id: "compute_api"
    vendor_service: "Amazon ECS on Fargate"
    configuration:
      cluster: "kashikaigishitsu-cluster"
      task_definition:
        cpu: 512
        memory: 1024
        container:
          port: 8080
          log_driver: "awslogs"
      service:
        desired_count: 2
        min_healthy_percent: 100
        max_percent: 200
        deployment_circuit_breaker: true
      auto_scaling:
        min_capacity: 2
        max_capacity: 6
        target_cpu_utilization: 70
        scale_in_cooldown: 300
        scale_out_cooldown: 60
      environment:
        DATABASE_URL: "ssm:/kashikaigishitsu/database-url"
        REDIS_URL: "ssm:/kashikaigishitsu/redis-url"
        COGNITO_USER_POOL_ID: "ssm:/kashikaigishitsu/cognito-pool-id"
    dependencies:
      - "comp-database"
      - "comp-cache"
      - "comp-sqs"
    iac_module: "infra/product/aws/modules/ecs-service"
    validation_rules:
      - rule: "min_tasks_running"
        type: "runtime"
        description: "最小2タスクが稼働していること"

  - id: "comp-worker"
    name: "ワーカー（ECS Fargate）"
    canonical_element_id: "compute_worker"
    vendor_service: "Amazon ECS on Fargate"
    configuration:
      task_definition:
        cpu: 512
        memory: 1024
        container:
          log_driver: "awslogs"
      sqs_worker:
        queue_ref: "comp-sqs"
        max_concurrent: 4
      scheduled_tasks:
        - name: "monthly-settlement"
          schedule: "cron(0 0 L * ? *)"
          task_count: 1
          cpu: 1024
          memory: 2048
    dependencies:
      - "comp-database"
      - "comp-sqs"
    iac_module: "infra/product/aws/modules/ecs-worker"
    validation_rules:
      - rule: "dlq_configured"
        type: "static"
        description: "Dead Letter Queue が設定されていること"

  - id: "comp-database"
    name: "データベース（RDS PostgreSQL）"
    canonical_element_id: "database_primary"
    vendor_service: "Amazon RDS for PostgreSQL"
    configuration:
      engine: "postgres"
      engine_version: "16"
      instance_class: "db.r6g.large"
      storage:
        type: "gp3"
        size_gb: 100
        max_allocated_gb: 500
        iops: 3000
      multi_az: true
      backup:
        retention_period: 7
        preferred_window: "03:00-04:00"
      encryption:
        enabled: true
        kms_key: "aws/rds"
      performance_insights:
        enabled: true
        retention_period: 7
      parameters:
        max_connections: 200
        shared_buffers: "256MB"
        work_mem: "4MB"
        log_min_duration_statement: 1000
      security:
        publicly_accessible: false
        vpc_security_group: "sg-rds"
    dependencies: []
    iac_module: "infra/product/aws/modules/rds"
    validation_rules:
      - rule: "encryption_enabled"
        type: "static"
        description: "暗号化が有効であること"
      - rule: "multi_az_enabled"
        type: "static"
        description: "Multi-AZ が有効であること"
      - rule: "backup_configured"
        type: "static"
        description: "自動バックアップが有効であること"

  - id: "comp-cache"
    name: "キャッシュ（ElastiCache Redis）"
    canonical_element_id: "cache"
    vendor_service: "Amazon ElastiCache for Redis"
    configuration:
      engine_version: "7.1"
      node_type: "cache.r6g.large"
      num_cache_clusters: 2
      automatic_failover: true
      at_rest_encryption: true
      in_transit_encryption: true
      snapshot:
        retention_limit: 3
        window: "04:00-05:00"
      parameters:
        maxmemory_policy: "allkeys-lru"
        timeout: 300
    dependencies: []
    iac_module: "infra/product/aws/modules/elasticache"
    validation_rules:
      - rule: "encryption_enabled"
        type: "static"
        description: "暗号化（at-rest + in-transit）が有効であること"

  - id: "comp-sqs"
    name: "メッセージキュー（SQS）"
    canonical_element_id: "message_queue"
    vendor_service: "Amazon SQS"
    configuration:
      queue_type: "Standard"
      visibility_timeout: 300
      message_retention: 1209600
      delay_seconds: 0
      dead_letter_queue:
        enabled: true
        max_receive_count: 3
      encryption:
        type: "SSE-SQS"
    dependencies: []
    iac_module: "infra/product/aws/modules/sqs"
    validation_rules:
      - rule: "dlq_configured"
        type: "static"
        description: "Dead Letter Queue が設定されていること"

  - id: "comp-vpc"
    name: "ネットワーク（VPC）"
    canonical_element_id: "network_segmentation"
    vendor_service: "Amazon VPC"
    configuration:
      cidr: "10.0.0.0/16"
      availability_zones: 2
      subnets:
        public:
          - "10.0.1.0/24"
          - "10.0.2.0/24"
        private_app:
          - "10.0.11.0/24"
          - "10.0.12.0/24"
        private_data:
          - "10.0.21.0/24"
          - "10.0.22.0/24"
      nat_gateway:
        count: 1
        type: "managed"
      flow_logs:
        enabled: true
        destination: "cloudwatch-logs"
    dependencies: []
    iac_module: "infra/product/aws/modules/vpc"
    validation_rules:
      - rule: "flow_logs_enabled"
        type: "static"
        description: "VPC Flow Logs が有効であること"
