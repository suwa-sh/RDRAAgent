decision_refs: []
inputs_ref:
  - "product-kashikaigishitsu-workload-model"
  - "product-kashikaigishitsu-impl-aws"

cost_posture: "balanced"

monthly_estimate:
  currency: "USD"
  total_range:
    low: 800
    high: 1500
  breakdown:
    - component: "ECS Fargate (API + Worker)"
      estimate_range:
        low: 150
        high: 300
      notes: "API: 2-6 タスク (0.5 vCPU / 1GB)。Worker: 1-4 タスク + 月末バッチ"
    - component: "App Runner (Frontend)"
      estimate_range:
        low: 50
        high: 100
      notes: "1-4 インスタンス (1 vCPU / 2GB)。自動スケーリング"
    - component: "RDS PostgreSQL (Multi-AZ)"
      estimate_range:
        low: 250
        high: 400
      notes: "db.r6g.large Multi-AZ。100-500 GB gp3 ストレージ"
    - component: "ElastiCache Redis"
      estimate_range:
        low: 100
        high: 150
      notes: "cache.r6g.large x 2 ノード（プライマリ + レプリカ）"
    - component: "API Gateway"
      estimate_range:
        low: 10
        high: 50
      notes: "REST API。月間 1-5M リクエスト想定"
    - component: "CloudFront"
      estimate_range:
        low: 20
        high: 50
      notes: "PriceClass_200。月間 10-50 GB データ転送"
    - component: "SQS"
      estimate_range:
        low: 5
        high: 15
      notes: "Standard Queue。月間 1-10M メッセージ"
    - component: "Cognito"
      estimate_range:
        low: 0
        high: 50
      notes: "50,000 MAU まで無料枠。MFA 利用時は追加コスト"
    - component: "WAF"
      estimate_range:
        low: 20
        high: 40
      notes: "Web ACL + マネージドルール 4 種"
    - component: "Networking (VPC/NAT)"
      estimate_range:
        low: 40
        high: 80
      notes: "NAT Gateway + データ転送"
    - component: "Monitoring (CloudWatch)"
      estimate_range:
        low: 20
        high: 50
      notes: "ログ保存、メトリクス、ダッシュボード"

optimization_strategies:
  rightsizing:
    - component: "comp-api"
      recommendation: "初期は 0.5 vCPU / 1 GB で開始し、CPU 使用率 70% 超過が続く場合にスケールアップ"
      savings_potential: "medium"
      risk: "low"
    - component: "comp-database"
      recommendation: "db.r6g.large で開始。Performance Insights でクエリパターンを分析し、3ヶ月後にライトサイジング"
      savings_potential: "medium"
      risk: "low"
    - component: "comp-cache"
      recommendation: "cache.r6g.large で開始。メモリ使用率が 50% 未満なら cache.r6g.medium にダウンサイズ"
      savings_potential: "low"
      risk: "low"

  reserved_instances:
    - component: "comp-database"
      recommendation: "RDS リザーブドインスタンス（1年、部分前払い）で約 30-40% コスト削減"
      savings_potential: "high"
      commitment: "1 year"
      risk: "medium"
      precondition: "3ヶ月間の利用パターン安定を確認後に購入"
    - component: "comp-cache"
      recommendation: "ElastiCache リザーブドノード（1年）で約 30% コスト削減"
      savings_potential: "medium"
      commitment: "1 year"
      risk: "medium"
      precondition: "利用パターン安定後"

  compute_savings:
    - component: "comp-api"
      recommendation: "Fargate Spot を非クリティカルなタスクに適用（追加スケーリング分のみ）"
      savings_potential: "low"
      risk: "medium"
      notes: "ベースライン 2 タスクは On-Demand を維持。スケールアウト分のみ Spot"
    - component: "comp-worker"
      recommendation: "月末精算バッチは Fargate Spot で実行可能（冪等性保証済みのため再実行可）"
      savings_potential: "low"
      risk: "low"
      notes: "ジョブ冪等性が保証されているため、Spot 中断時は再実行で対応"

  storage:
    - component: "comp-database"
      recommendation: "gp3 ストレージ（gp2 比でコスト効率が高い）。IOPS は 3000 で開始"
      savings_potential: "low"
      risk: "low"
    - component: "logging"
      recommendation: "CloudWatch Logs の保持期間を用途別に設定（audit: 365日、access: 180日、diagnostic: 90日）。S3 アーカイブで長期保存"
      savings_potential: "low"
      risk: "low"

  data_transfer:
    - recommendation: "CloudFront で静的アセットをキャッシュ配信し、オリジンへのリクエストを削減"
      savings_potential: "low"
      risk: "low"
    - recommendation: "VPC エンドポイント（S3, SQS, CloudWatch）で NAT Gateway 経由のデータ転送を削減"
      savings_potential: "low"
      risk: "low"

  auto_scaling:
    - component: "comp-api"
      parameters:
        metric: "CPUUtilization"
        target: 70
        min_capacity: 2
        max_capacity: 6
        scale_out_cooldown: 60
        scale_in_cooldown: 300
      recommendation: "CPU 70% ターゲットトラッキング。スケールイン遅延を長めに設定しフラッピング防止"
    - component: "comp-frontend"
      parameters:
        metric: "Concurrency"
        target: 100
        min_capacity: 1
        max_capacity: 4
      recommendation: "App Runner の自動スケーリングを利用。最小 1 インスタンス"
