uc: "バーチャル会議室を登録する"
business: "会議室管理業務"
buc: "会議室管理フロー"

models:
  - name: "VirtualRoomRegistrationForm"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "会議室情報"
  - name: "VirtualRoomState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "会議室情報"
  - name: "CreateVirtualRoomRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "会議室情報"
  - name: "CreateVirtualRoomRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "会議室情報"
  - name: "CreateVirtualRoomCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "会議室情報"
  - name: "Room"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "会議室情報"
  - name: "RoomRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
    rdra_info: "会議室情報"

tables:
  - name: "rooms"
    rdra_info: "会議室情報"
    operations:
      - type: "INSERT"
        columns:
          - name: "room_id"
            value: "UUID 自動採番"
          - name: "owner_id"
            value: "認証済みオーナーID"
          - name: "room_name"
            value: "バーチャル会議室名"
          - name: "room_type"
            value: "virtual"
          - name: "tool_type"
            value: "Zoom/Teams/Google Meet"
          - name: "max_connections"
            value: "同時接続数"
          - name: "recording_enabled"
            value: "録画可否"
          - name: "price"
            value: "時間単価"
          - name: "status"
            value: "非公開"
        where: ""
    indexes_needed:
      - columns: ["owner_id"]
        reason: "オーナーの会議室一覧取得"
        access_pattern: "GET /api/v1/rooms?owner_id={owner_id}"
  - name: "meeting_urls"
    rdra_info: "会議URL"
    operations:
      - type: "INSERT"
        columns:
          - name: "meeting_url_id"
            value: "UUID 自動採番"
          - name: "room_id"
            value: "登録した会議室ID"
          - name: "tool_type"
            value: "Zoom/Teams/Google Meet"
          - name: "meeting_url"
            value: "会議URL"
          - name: "expired_at"
            value: "有効期限"
        where: ""
    indexes_needed:
      - columns: ["room_id"]
        reason: "会議室の会議URL取得"
        access_pattern: "予約確定時の会議URL通知"

kvs: []
object_storage: []
