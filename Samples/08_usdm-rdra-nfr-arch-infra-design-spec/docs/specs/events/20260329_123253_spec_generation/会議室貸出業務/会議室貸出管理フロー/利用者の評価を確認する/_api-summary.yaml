uc: "利用者の評価を確認する"
business: "会議室貸出業務"
buc: "会議室貸出管理フロー"
endpoints:
  - method: "GET"
    path: "/api/v1/users/{userId}/ratings"
    summary: "利用者評価一覧取得（使用許諾判断の参考情報）"
    request_schema: null
    response_schema: "UserRatingsResponse"
    tags: ["users", "ratings", "rental"]
async_events: []
schemas:
  - name: "UserRatingsResponse"
    properties:
      - name: "userId"
        type: "string"
        required: true
      - name: "userName"
        type: "string"
        required: true
      - name: "averageScore"
        type: "number"
        required: false
      - name: "totalCount"
        type: "integer"
        required: true
      - name: "ratings"
        type: "array"
        required: true
