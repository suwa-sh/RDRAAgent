tables:
  - name: "user_reviews"
    rdra_info: "利用者評価"
    operations:
      - type: "SELECT"
        columns: []
        where: "usage_id=? AND review_type='user_rating'"
      - type: "INSERT"
        columns:
          - name: "review_type"
            value: "user_rating"
          - name: "owner_id"
            value: "認証済みオーナーID"
          - name: "user_id"
            value: "利用者ID"
          - name: "usage_id"
            value: "会議室利用ID"
          - name: "score"
            value: "1-5の評価スコア"
          - name: "comment"
            value: "評価コメント"
          - name: "evaluated_at"
            value: "NOW()"
        where: ""
    indexes_needed:
      - columns: ["usage_id", "review_type"]
        reason: "重複チェックのため利用IDと評価種別で検索"
        access_pattern: "POST /api/v1/usages/{id}/user-rating 重複評価チェック"
  - name: "usages"
    rdra_info: "会議室利用"
    operations:
      - type: "SELECT"
        columns: []
        where: "id=? AND status='利用終了'"
    indexes_needed: []
