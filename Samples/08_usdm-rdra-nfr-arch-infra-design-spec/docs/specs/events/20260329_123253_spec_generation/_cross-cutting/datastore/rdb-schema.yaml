        description: "精算日時"
    primary_key: ["settlement_id"]
    foreign_keys:
      - columns: ["owner_id"]
        references:
          table: "owners"
          columns: ["owner_id"]
        on_delete: "RESTRICT"
    indexes:
      - name: "idx_settlements_status"
        columns: ["status"]
        unique: false
        reason: "精算計算済み一覧取得"
        used_by: ["精算を実行する"]
      - name: "idx_settlements_status_target_month"
        columns: ["status", "target_month"]
        unique: false
        reason: "未精算一覧取得・精算計算済み更新"
        used_by: ["精算額を計算する"]
      - name: "idx_settlements_owner_id_status"
        columns: ["owner_id", "status"]
        unique: false
        reason: "オーナー別精算履歴参照"
        used_by: ["精算結果を確認する"]
    used_by:
      - uc: "精算額を計算する"
        operations: ["SELECT", "UPDATE"]
      - uc: "精算を実行する"
        operations: ["SELECT", "UPDATE"]
      - uc: "精算結果を確認する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # owner_payments — オーナー精算（支払実行記録）
  # -----------------------------------------------------------------------
  - name: "owner_payments"
    rdra_info: "オーナー精算"
    description: "精算額を決済機関を通じてオーナーへ支払う処理結果。冪等キーによる二重支払防止。"
    columns:
      - name: "payment_id"
        type: "uuid"
        nullable: false
        description: "精算実行ID（PK）"
      - name: "settlement_id"
        type: "uuid"
        nullable: false
        description: "精算ID（FK → settlements）"
      - name: "external_payment_id"
        type: "string"
        nullable: true
        description: "決済機関連携ID"
      - name: "amount"
        type: "decimal"
        nullable: false
        description: "支払金額"
      - name: "status"
        type: "string"
        nullable: false
        description: "支払状態 (支払処理中 / 支払済み / 支払失敗)"
      - name: "idempotency_key"
        type: "string"
        nullable: false
        description: "冪等キー（二重支払防止）"
      - name: "paid_at"
        type: "datetime"
        nullable: true
        description: "支払日時"
    primary_key: ["payment_id"]
    foreign_keys:
      - columns: ["settlement_id"]
        references:
          table: "settlements"
          columns: ["settlement_id"]
        on_delete: "RESTRICT"
    indexes:
      - name: "idx_owner_payments_idempotency_key"
        columns: ["idempotency_key"]
        unique: true
        reason: "冪等性チェック（二重支払防止）"
        used_by: ["精算を実行する"]
      - name: "idx_owner_payments_settlement_id"
        columns: ["settlement_id"]
        unique: false
        reason: "精算詳細の支払情報取得"
        used_by: ["精算結果を確認する"]
    used_by:
      - uc: "精算を実行する"
        operations: ["INSERT", "UPDATE"]
      - uc: "精算結果を確認する"
        operations: ["SELECT"]

