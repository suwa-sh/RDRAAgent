version: "1.0"
datastore: "rdb"
description: "全46UC の _model-summary.yaml を統合した RDB スキーマ定義。RDRA 情報.tsv の属性からカラム型を導出。"

tables:

  # -----------------------------------------------------------------------
  # owners — オーナー情報
  # -----------------------------------------------------------------------
  - name: "owners"
    rdra_info: "オーナー情報"
    description: "会議室を貸し出すオーナーのプロフィール・登録情報。審査・退会フローを管理する。"
    columns:
      - name: "owner_id"
        type: "uuid"
        nullable: false
        description: "オーナーID（PK）"
      - name: "name"
        type: "string"
        nullable: false
        description: "氏名"
      - name: "phone"
        type: "string"
        nullable: true
        description: "連絡先電話番号"
      - name: "email"
        type: "string"
        nullable: false
        description: "メールアドレス（一意）"
      - name: "status"
        type: "string"
        nullable: false
        description: "審査状態 (審査待ち / 登録済み / 却下 / 退会)"
      - name: "applied_at"
        type: "datetime"
        nullable: false
        description: "登録申請日時"
      - name: "reviewed_at"
        type: "datetime"
        nullable: true
        description: "審査完了日時"
      - name: "withdrawn_at"
        type: "datetime"
        nullable: true
        description: "退会日時"
      - name: "updated_at"
        type: "datetime"
        nullable: true
        description: "最終更新日時"
    primary_key: ["owner_id"]
    foreign_keys: []
    indexes:
      - name: "idx_owners_email"
        columns: ["email"]
        unique: true
        reason: "メールアドレス重複チェック（オーナー登録申請時）"
        used_by: ["オーナー登録申請を行う"]
      - name: "idx_owners_status"
        columns: ["status"]
        unique: false
        reason: "審査待ち一覧取得・状態別フィルタリング"
        used_by: ["オーナー登録を審査する", "オーナー登録審査一覧を確認する"]
      - name: "idx_owners_status_applied_at"
        columns: ["status", "applied_at"]
        unique: false
        reason: "審査状態フィルタ + 申請日時ソート"
        used_by: ["オーナー登録審査一覧を確認する"]
    used_by:
      - uc: "オーナー登録申請を行う"
        operations: ["INSERT", "SELECT"]
      - uc: "オーナー情報を変更する"
        operations: ["SELECT", "UPDATE"]
      - uc: "オーナー登録を審査する"
        operations: ["SELECT", "UPDATE"]
      - uc: "退会を申請する"
        operations: ["SELECT", "UPDATE"]
      - uc: "オーナー登録審査一覧を確認する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # rooms — 会議室情報
  # -----------------------------------------------------------------------
  - name: "rooms"
    rdra_info: "会議室情報"
    description: "物理・バーチャル両方の会議室物件情報。公開状態・バーチャル属性を含む。"
    columns:
      - name: "room_id"
        type: "uuid"
        nullable: false
        description: "会議室ID（PK）"
      - name: "owner_id"
        type: "uuid"
        nullable: false
        description: "オーナーID（FK → owners）"
      - name: "room_name"
        type: "string"
        nullable: false
        description: "会議室名"
      - name: "room_type"
        type: "string"
        nullable: false
        description: "会議室種別 (physical / virtual)"
      - name: "location"
        type: "string"
        nullable: true
        description: "所在地（物理会議室のみ）"
      - name: "area"
        type: "string"
        nullable: true
        description: "エリア区分（検索絞り込み用）"
      - name: "capacity"
        type: "integer"
        nullable: true
        description: "収容人数"
      - name: "price"
        type: "decimal"
        nullable: false
        description: "時間単価（利用料金）"
      - name: "facilities"
        type: "text"
        nullable: true
        description: "設備・機能（JSON または CSV 形式）"
      - name: "tool_type"
        type: "string"
        nullable: true
        description: "会議ツール種別（バーチャルのみ: Zoom/Teams/Google Meet）"
      - name: "max_connections"
        type: "integer"
        nullable: true
        description: "同時接続数（バーチャルのみ）"
      - name: "recording_enabled"
        type: "boolean"
        nullable: true
        description: "録画可否（バーチャルのみ）"
      - name: "status"
        type: "string"
        nullable: false
        default: "非公開"
        description: "公開状態 (非公開 / 公開中)"
      - name: "avg_rating"
        type: "decimal"
        nullable: true
        description: "平均評価スコア（評価登録時に更新）"
      - name: "created_at"
        type: "datetime"
        nullable: false
        description: "登録日時"
      - name: "updated_at"
        type: "datetime"
        nullable: true
        description: "最終更新日時"
    primary_key: ["room_id"]
    foreign_keys:
      - columns: ["owner_id"]
        references:
          table: "owners"
          columns: ["owner_id"]
        on_delete: "RESTRICT"
    indexes:
      - name: "idx_rooms_owner_id_status"
        columns: ["owner_id", "status"]
        unique: false
        reason: "オーナーの会議室一覧と公開状態フィルタ"
        used_by: ["会議室を登録する", "会議室の公開状態を変更する", "退会を申請する"]
      - name: "idx_rooms_status_type_area"
        columns: ["status", "room_type", "area"]
        unique: false
        reason: "公開中の会議室を種別・エリアで絞り込み検索"
        used_by: ["会議室を検索する"]
      - name: "idx_rooms_status_capacity"
        columns: ["status", "capacity"]
        unique: false
        reason: "収容人数フィルタリング"
        used_by: ["会議室を検索する"]
      - name: "idx_rooms_status_avg_rating"
        columns: ["status", "avg_rating"]
        unique: false
        reason: "評価スコアフィルタリング"
        used_by: ["会議室を検索する"]
      - name: "idx_rooms_owner_id"
        columns: ["owner_id"]
        unique: false
        reason: "オーナーの全会議室を取得（退会時一括非公開等）"
        used_by: ["バーチャル会議室を登録する", "退会を申請する"]
    used_by:
      - uc: "会議室を登録する"
        operations: ["INSERT"]
      - uc: "バーチャル会議室を登録する"
        operations: ["INSERT"]
      - uc: "会議室情報を変更する"
        operations: ["SELECT", "UPDATE"]
      - uc: "会議室の公開状態を変更する"
        operations: ["SELECT", "UPDATE"]
      - uc: "キャンセルポリシーを設定する"
        operations: ["UPDATE"]
      - uc: "運用ルールを設定する"
        operations: ["UPDATE"]
      - uc: "会議室を検索する"
        operations: ["SELECT"]
      - uc: "会議室の詳細を確認する"
        operations: ["SELECT"]
      - uc: "退会を申請する"
        operations: ["UPDATE"]
      - uc: "会議室を評価する"
        operations: ["UPDATE"]
      - uc: "バーチャル会議室を評価する"
        operations: ["UPDATE"]
      - uc: "利用履歴を管理する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # operation_rules — 運用ルール
  # -----------------------------------------------------------------------
  - name: "operation_rules"
    rdra_info: "運用ルール"
    description: "会議室ごとの利用可能時間帯・最低/最大利用時間・貸出可否などの運用条件。"
    columns:
      - name: "rule_id"
        type: "uuid"
        nullable: false
        description: "ルールID（PK）"
      - name: "room_id"
        type: "uuid"
        nullable: false
        description: "会議室ID（FK → rooms）"
      - name: "available_hours"
        type: "string"
        nullable: true
        description: "利用可能時間帯（例: 09:00-22:00）"
      - name: "min_usage_time"
        type: "integer"
        nullable: true
        description: "最低利用時間（分）"
      - name: "max_usage_time"
        type: "integer"
        nullable: true
        description: "最大利用時間（分）"
      - name: "can_rent"
        type: "boolean"
        nullable: false
        default: "true"
        description: "貸出可否"
      - name: "created_at"
        type: "datetime"
        nullable: false
        description: "設定日時"
    primary_key: ["rule_id"]
    foreign_keys:
      - columns: ["room_id"]
        references:
          table: "rooms"
          columns: ["room_id"]
        on_delete: "CASCADE"
    indexes:
      - name: "idx_operation_rules_room_id"
        columns: ["room_id"]
        unique: false
        reason: "会議室IDに紐づく運用ルールの取得"
        used_by: ["運用ルールを設定する", "予約を申請する", "予約を変更する", "会議室の詳細を確認する", "キャンセルポリシーを設定する"]
    used_by:
      - uc: "運用ルールを設定する"
        operations: ["SELECT", "INSERT"]
      - uc: "キャンセルポリシーを設定する"
        operations: ["SELECT"]
      - uc: "予約を申請する"
        operations: ["SELECT"]
      - uc: "予約を変更する"
        operations: ["SELECT"]
      - uc: "会議室の詳細を確認する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # cancel_policies — キャンセルポリシー
  # -----------------------------------------------------------------------
  - name: "cancel_policies"
    rdra_info: "キャンセルポリシー"
    description: "予約取消時に適用されるキャンセル料の発生条件・返金ルール。"
    columns:
      - name: "policy_id"
        type: "uuid"
        nullable: false
        description: "ポリシーID（PK）"
      - name: "room_id"
        type: "uuid"
        nullable: false
        description: "会議室ID（FK → rooms）"
      - name: "cancel_deadline"
        type: "integer"
        nullable: true
        description: "キャンセル期限（利用開始何時間前まで無料か）"
      - name: "cancel_rate"
        type: "decimal"
        nullable: true
        description: "キャンセル料率（%）"
      - name: "refund_rule"
        type: "text"
        nullable: true
        description: "返金ルール（テキスト説明）"
      - name: "created_at"
        type: "datetime"
        nullable: false
        description: "設定日時"
    primary_key: ["policy_id"]
    foreign_keys:
      - columns: ["room_id"]
        references:
          table: "rooms"
          columns: ["room_id"]
        on_delete: "CASCADE"
    indexes:
      - name: "idx_cancel_policies_room_id"
        columns: ["room_id"]
        unique: false
        reason: "会議室IDに紐づくキャンセルポリシー取得（予約取消時のキャンセル料計算）"
        used_by: ["キャンセルポリシーを設定する", "予約を取り消す", "運用ルールを設定する"]
    used_by:
      - uc: "キャンセルポリシーを設定する"
        operations: ["SELECT", "INSERT"]
      - uc: "運用ルールを設定する"
        operations: ["SELECT"]
      - uc: "予約を取り消す"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # meeting_urls — 会議URL
  # -----------------------------------------------------------------------
  - name: "meeting_urls"
    rdra_info: "会議URL"
    description: "バーチャル会議室の予約確定時に利用者へ通知する会議URL。"
    columns:
      - name: "meeting_url_id"
        type: "uuid"
        nullable: false
        description: "会議URL_ID（PK）"
      - name: "room_id"
        type: "uuid"
        nullable: false
        description: "会議室ID（FK → rooms）"
      - name: "tool_type"
        type: "string"
        nullable: false
        description: "会議ツール種別（Zoom/Teams/Google Meet）"
      - name: "meeting_url"
        type: "string"
        nullable: false
        description: "会議URL"
      - name: "expired_at"
        type: "datetime"
        nullable: true
        description: "有効期限"
      - name: "created_at"
        type: "datetime"
        nullable: false
        description: "登録日時"
    primary_key: ["meeting_url_id"]
    foreign_keys:
      - columns: ["room_id"]
        references:
          table: "rooms"
          columns: ["room_id"]
        on_delete: "CASCADE"
    indexes:
      - name: "idx_meeting_urls_room_id"
        columns: ["room_id"]
        unique: false
        reason: "予約確定時の会議URL取得（FaaS 会議URL通知処理）"
        used_by: ["バーチャル会議室を登録する", "会議URLを通知する"]
    used_by:
      - uc: "バーチャル会議室を登録する"
        operations: ["INSERT"]
      - uc: "会議URLを通知する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # users — 利用者情報
  # -----------------------------------------------------------------------
  - name: "users"
    rdra_info: "利用者情報"
    description: "会議室を利用する利用者の基本情報。予約・利用・評価の主体として各情報と紐づく。"
    columns:
      - name: "user_id"
        type: "uuid"
        nullable: false
        description: "利用者ID（PK）"
      - name: "name"
        type: "string"
        nullable: false
        description: "氏名"
      - name: "phone"
        type: "string"
        nullable: true
        description: "連絡先電話番号"
      - name: "email"
        type: "string"
        nullable: false
        description: "メールアドレス（一意）"
      - name: "registered_at"
        type: "datetime"
        nullable: false
        description: "登録日時"
    primary_key: ["user_id"]
    foreign_keys: []
    indexes: []
    used_by:
      - uc: "会議URLを通知する"
        operations: ["SELECT"]
      - uc: "利用履歴を管理する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # payment_methods — 決済情報（決済手段）
  # -----------------------------------------------------------------------
  - name: "payment_methods"
    rdra_info: "決済情報"
    description: "利用者が登録した決済手段（クレジットカード・電子マネー）。PCI DSS 準拠でトークン管理。"
    columns:
      - name: "payment_method_id"
        type: "uuid"
        nullable: false
        description: "決済方法ID（PK）"
      - name: "user_id"
        type: "uuid"
        nullable: false
        description: "利用者ID（FK → users）"
      - name: "method_type"
        type: "string"
        nullable: false
        description: "決済方法 (クレジットカード / 電子マネー)"
      - name: "token"
        type: "string"
        nullable: false
        description: "暗号化済み決済トークン（PCI DSS 準拠）"
      - name: "last_four"
        type: "string"
        nullable: true
        description: "カード番号末尾4桁（表示用）"
      - name: "status"
        type: "string"
        nullable: false
        description: "決済手段状態 (決済手段登録済み / 無効)"
      - name: "created_at"
        type: "datetime"
        nullable: false
        description: "登録日時"
    primary_key: ["payment_method_id"]
    foreign_keys:
      - columns: ["user_id"]
        references:
          table: "users"
          columns: ["user_id"]
        on_delete: "RESTRICT"
    indexes:
      - name: "idx_payment_methods_user_id_status"
        columns: ["user_id", "status"]
        unique: false
        reason: "利用者の有効な決済方法一覧取得（予約申請時）"
        used_by: ["決済方法を設定する"]
    used_by:
      - uc: "決済方法を設定する"
        operations: ["INSERT"]

  # -----------------------------------------------------------------------
  # reservations — 予約情報
  # -----------------------------------------------------------------------
  - name: "reservations"
    rdra_info: "予約情報"
    description: "利用者の会議室予約内容。物理・バーチャル両方の予約に対応。申請→確定→利用→取消の状態遷移を管理。"
    columns:
      - name: "reservation_id"
        type: "uuid"
        nullable: false
        description: "予約ID（PK）"
      - name: "user_id"
        type: "uuid"
        nullable: false
        description: "利用者ID（FK → users）"
      - name: "room_id"
        type: "uuid"
        nullable: false
        description: "会議室ID（FK → rooms）"
      - name: "room_type"
        type: "string"
        nullable: false
        description: "会議室種別スナップショット (physical / virtual)"
      - name: "start_at"
        type: "datetime"
        nullable: false
        description: "利用開始日時"
      - name: "end_at"
        type: "datetime"
        nullable: false
        description: "利用終了日時"
      - name: "status"
        type: "string"
        nullable: false
        description: "予約状態 (申請 / 確定 / 変更 / 取消)"
      - name: "fee"
        type: "decimal"
        nullable: false
        description: "利用料金"
      - name: "payment_method_id"
        type: "uuid"
        nullable: true
        description: "決済方法ID（FK → payment_methods）"
      - name: "cancel_fee"
        type: "decimal"
        nullable: true
        description: "キャンセル料（取消時のみ）"
      - name: "rejection_reason"
        type: "text"
        nullable: true
        description: "拒否理由（審査拒否時のみ）"
      - name: "created_at"
        type: "datetime"
        nullable: false
        description: "申請日時"
      - name: "updated_at"
        type: "datetime"
        nullable: true
        description: "最終更新日時"
    primary_key: ["reservation_id"]
    foreign_keys:
      - columns: ["user_id"]
        references:
          table: "users"
          columns: ["user_id"]
        on_delete: "RESTRICT"
      - columns: ["room_id"]
        references:
          table: "rooms"
          columns: ["room_id"]
        on_delete: "RESTRICT"
      - columns: ["payment_method_id"]
        references:
          table: "payment_methods"
          columns: ["payment_method_id"]
        on_delete: "SET NULL"
    indexes:
      - name: "idx_reservations_room_id_start_end_status"
        columns: ["room_id", "start_at", "end_at", "status"]
        unique: false
        reason: "重複予約チェック（物理・バーチャル共通）"
        used_by: ["予約を申請する", "バーチャル会議室を予約する", "予約を変更する"]
      - name: "idx_reservations_user_id_status"
        columns: ["user_id", "status"]
        unique: false
        reason: "利用者が自身の予約一覧を状態でフィルタリング"
        used_by: ["予約を申請する", "予約を取り消す"]
      - name: "idx_reservations_room_id_status"
        columns: ["room_id", "status"]
        unique: false
        reason: "オーナーが自身の会議室への申請一覧を取得"
        used_by: ["予約を許諾する", "予約を審査する"]
      - name: "idx_reservations_status_room_type_start_at"
        columns: ["status", "room_type", "start_at"]
        unique: false
        reason: "CronJob による利用開始対象の確定済みバーチャル予約取得"
        used_by: ["バーチャル会議室利用を開始する"]
      - name: "idx_reservations_status_room_type_end_at"
        columns: ["status", "room_type", "end_at"]
        unique: false
        reason: "CronJob による利用終了対象の確定済みバーチャル予約取得"
        used_by: ["バーチャル会議室利用を終了する"]
    used_by:
      - uc: "予約を申請する"
        operations: ["SELECT", "INSERT"]
      - uc: "バーチャル会議室を予約する"
        operations: ["SELECT", "INSERT"]
      - uc: "予約を変更する"
        operations: ["SELECT", "UPDATE"]
      - uc: "予約を取り消す"
        operations: ["SELECT", "UPDATE"]
      - uc: "予約を許諾する"
        operations: ["SELECT", "UPDATE"]
      - uc: "予約を審査する"
        operations: ["SELECT", "UPDATE"]
      - uc: "鍵の貸出を記録する"
        operations: ["SELECT"]
      - uc: "会議URLを通知する"
        operations: ["SELECT"]
      - uc: "バーチャル会議室利用を開始する"
        operations: ["SELECT"]
      - uc: "バーチャル会議室利用を終了する"
        operations: ["SELECT"]

  # -----------------------------------------------------------------------
  # keys — 鍵
  # -----------------------------------------------------------------------
  - name: "keys"
    rdra_info: "鍵"
    description: "物理会議室の鍵の貸出・返却状態。利用開始・終了を制御する物理インターフェース。"
    columns:
      - name: "key_id"
        type: "uuid"
        nullable: false
        description: "鍵ID（PK）"
      - name: "room_id"
        type: "uuid"
        nullable: false
        description: "会議室ID（FK → rooms）"
      - name: "status"
        type: "string"
        nullable: false
        description: "貸出状態 (保管中 / 貸出中)"
      - name: "lent_at"
        type: "datetime"
        nullable: true
        description: "貸出日時"
      - name: "returned_at"
        type: "datetime"
        nullable: true
        description: "返却日時"
    primary_key: ["key_id"]
    foreign_keys:
      - columns: ["room_id"]
        references:
          table: "rooms"
          columns: ["room_id"]
        on_delete: "RESTRICT"
    indexes:
      - name: "idx_keys_room_id_status"
        columns: ["room_id", "status"]
        unique: false
        reason: "会議室の鍵の貸出状態確認・貸出中鍵の特定（悲観ロック対象）"
        used_by: ["鍵の貸出を記録する", "鍵の返却を記録する"]
    used_by:
