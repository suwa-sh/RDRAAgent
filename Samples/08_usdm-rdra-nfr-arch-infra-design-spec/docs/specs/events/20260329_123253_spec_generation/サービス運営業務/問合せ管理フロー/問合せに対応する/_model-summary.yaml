tables:
  - name: "inquiries"
    rdra_info: "問合せ"
    operations:
      - type: "SELECT"
        columns: []
        where: "inquiry_id = {inquiry_id} AND status = '未対応'"
      - type: "UPDATE"
        columns:
          - name: "status"
            value: "回答済み"
          - name: "answer_content"
            value: "回答内容テキスト"
          - name: "answered_at"
            value: "NOW()"
        where: "inquiry_id = {inquiry_id}"
    indexes_needed:
      - columns: ["status", "inquiry_type"]
        reason: "未対応のサービス問合せ一覧取得"
        access_pattern: "GET /api/v1/admin/inquiries?status=pending&type=service"

kvs: []
