uc: "利用履歴を管理する"
business: "サービス運営業務"
buc: "利用状況管理フロー"
endpoints:
  - method: "GET"
    path: "/api/v1/admin/usage-history"
    summary: "利用履歴一覧取得（集計軸・期間・利用者・会議室フィルター）"
    request_schema: "AdminUsageHistoryQuery"
    response_schema: "AdminUsageHistoryResponse"
    tags: ["admin", "usage-history"]
async_events: []
schemas:
  - name: "AdminUsageHistoryQuery"
    properties:
      - name: "dimension"
        type: "string"
        required: false
        enum: ["user", "room", "period"]
      - name: "from"
        type: "string"
        format: "date"
        required: false
      - name: "to"
        type: "string"
        format: "date"
        required: false
      - name: "user_id"
        type: "string"
        required: false
      - name: "room_id"
        type: "string"
        required: false
      - name: "sort"
        type: "string"
        required: false
      - name: "page"
        type: "integer"
        required: false
      - name: "per_page"
        type: "integer"
        required: false
  - name: "AdminUsageHistoryResponse"
    properties:
      - name: "items"
        type: "array"
        required: true
      - name: "summary"
        type: "object"
        required: true
      - name: "pagination"
        type: "object"
        required: true
