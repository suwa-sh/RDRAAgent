uc: "精算を実行する"
business: "精算業務"
buc: "オーナー精算フロー"

models:
  - name: "SettlementExecutePage"
    tier: "tier-frontend-admin"
    layer: "view"
    type: "view-model"
    rdra_info: "精算情報"
  - name: "SettlementExecuteState"
    tier: "tier-frontend-admin"
    layer: "state"
    type: "state"
    rdra_info: "精算情報"
  - name: "ExecuteSettlementRequest"
    tier: "tier-frontend-admin"
    layer: "api-client"
    type: "request"
    rdra_info: "精算情報"
  - name: "ExecuteSettlementRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "精算情報"
  - name: "ExecuteSettlementCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "精算情報"
  - name: "Settlement"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "精算情報"
  - name: "SettlementRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
    rdra_info: "精算情報"
  - name: "SettlementPaymentHandler"
    tier: "tier-faas-worker"
    layer: "handler"
    type: "command"
    rdra_info: "オーナー精算"
  - name: "PaymentGatewayClient"
    tier: "tier-faas-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "オーナー精算"

tables:
  - name: "settlements"
    rdra_info: "精算情報"
    operations:
      - type: "SELECT"
        columns: []
        where: "id = {settlement_id} AND status = '精算計算済み'"
      - type: "UPDATE"
        columns:
          - name: "status"
            value: "支払処理中"
        where: "id = {settlement_id}"
      - type: "UPDATE"
        columns:
          - name: "status"
            value: "支払済み"
        where: "id = {settlement_id}"
    indexes_needed:
      - columns: ["status"]
        reason: "精算計算済み一覧取得"
        access_pattern: "GET /api/v1/admin/settlements?status=calculated"
  - name: "owner_payments"
    rdra_info: "オーナー精算"
    operations:
      - type: "INSERT"
        columns:
          - name: "settlement_id"
            value: "精算ID"
          - name: "status"
            value: "支払処理中"
          - name: "idempotency_key"
            value: "冪等キー"
        where: ""
      - type: "UPDATE"
        columns:
          - name: "status"
            value: "支払済み"
          - name: "payment_id"
            value: "決済機関連携ID"
          - name: "paid_at"
            value: "NOW()"
        where: "idempotency_key = {idempotency_key}"
    indexes_needed:
      - columns: ["idempotency_key"]
        reason: "冪等性チェック（二重支払防止）"
        access_pattern: "POST /api/v1/admin/settlements/{id}/execute"

kvs: []
object_storage: []
