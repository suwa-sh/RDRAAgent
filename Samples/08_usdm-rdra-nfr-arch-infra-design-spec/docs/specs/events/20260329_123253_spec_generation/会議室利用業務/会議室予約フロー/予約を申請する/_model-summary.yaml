uc: "予約を申請する"
business: "会議室利用業務"
buc: "会議室予約フロー"
models:
  - name: "ReservationFormPage"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "予約情報"
  - name: "BookingState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "予約情報"
  - name: "CreateReservationRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "予約情報"
  - name: "CreateReservationRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "予約情報"
  - name: "CreateReservationCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "予約情報"
  - name: "Reservation"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "予約情報"
  - name: "ReservationRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
    rdra_info: "予約情報"
tables:
  - name: "reservations"
    rdra_info: "予約情報"
    operations:
      - type: "SELECT"
        columns: []
        where: "room_id=? AND start_at<? AND end_at>? AND status IN (申請,確定,変更)"
      - type: "INSERT"
        columns:
          - name: "room_id"
            value: "会議室ID"
          - name: "user_id"
            value: "認証済み利用者ID"
          - name: "room_type"
            value: "physical"
          - name: "start_at"
            value: "利用開始日時"
          - name: "end_at"
            value: "利用終了日時"
          - name: "status"
            value: "申請"
          - name: "fee"
            value: "計算済み利用料金"
          - name: "payment_method_id"
            value: "決済方法ID"
        where: ""
    indexes_needed:
      - columns: ["room_id", "start_at", "end_at", "status"]
        reason: "物理会議室の重複予約チェックのため"
        access_pattern: "POST /api/v1/reservations 重複チェック"
      - columns: ["user_id", "status"]
        reason: "利用者が自身の予約一覧を取得するため"
        access_pattern: "GET /api/v1/reservations 予約一覧取得"
  - name: "operation_rules"
    rdra_info: "運用ルール"
    operations:
      - type: "SELECT"
        columns: []
        where: "room_id=?"
    indexes_needed:
      - columns: ["room_id"]
        reason: "会議室IDに紐づく運用ルールを取得するため"
        access_pattern: "POST /api/v1/reservations 運用ルール確認"
kvs: []
object_storage: []
