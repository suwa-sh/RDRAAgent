uc: "予約を申請する"
business: "会議室利用業務"
buc: "会議室予約フロー"
endpoints:
  - method: "POST"
    path: "/api/v1/reservations"
    summary: "予約申請（運用ルール・重複チェック後に申請状態で作成）"
    request_schema: "ReservationRequest"
    response_schema: "ReservationResponse"
    tags: ["reservations"]
async_events: []
schemas:
  - name: "ReservationRequest"
    properties:
      - name: "room_id"
        type: "string"
        required: true
      - name: "start_datetime"
        type: "string"
        required: true
      - name: "end_datetime"
        type: "string"
        required: true
      - name: "payment_method"
        type: "string"
        required: true
  - name: "ReservationResponse"
    properties:
      - name: "reservation_id"
        type: "string"
        required: true
      - name: "status"
        type: "string"
        required: true
      - name: "room_id"
        type: "string"
        required: true
      - name: "start_datetime"
        type: "string"
        required: true
      - name: "end_datetime"
        type: "string"
        required: true
      - name: "fee"
        type: "integer"
        required: true
      - name: "payment_method"
        type: "string"
        required: true
