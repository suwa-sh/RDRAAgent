uc: "オーナーを評価する"
business: "会議室利用業務"
buc: "会議室評価フロー"
models:
  - name: "OwnerReviewFormPage"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "会議室評価"
  - name: "OwnerReviewState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "会議室評価"
  - name: "CreateOwnerReviewRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "会議室評価"
  - name: "CreateReviewRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "会議室評価"
  - name: "CreateOwnerReviewCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "会議室評価"
  - name: "RoomReview"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "会議室評価"
  - name: "ReviewRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
    rdra_info: "会議室評価"
tables:
  - name: "room_reviews"
    rdra_info: "会議室評価"
    operations:
      - type: "SELECT"
        columns: []
        where: "reservation_id=? AND review_type='owner'"
      - type: "INSERT"
        columns:
          - name: "review_type"
            value: "owner"
          - name: "owner_id"
            value: "評価対象オーナーID"
          - name: "user_id"
            value: "認証済み利用者ID"
          - name: "reservation_id"
            value: "予約ID"
          - name: "score"
            value: "1-5の評価スコア"
          - name: "comment"
            value: "評価コメント"
          - name: "created_at"
            value: "NOW()"
        where: ""
    indexes_needed:
      - columns: ["reservation_id", "review_type"]
        reason: "重複チェックのため予約IDと評価種別で検索"
        access_pattern: "POST /api/v1/reviews オーナー評価重複チェック"
  - name: "usages"
    rdra_info: "会議室利用"
    operations:
      - type: "SELECT"
        columns: []
        where: "user_id=? AND room_id IN (owner_rooms) AND status='利用終了'"
    indexes_needed: []
kvs: []
object_storage: []
