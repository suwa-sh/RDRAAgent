tables:
  - name: "reservations"
    rdra_info: "予約情報"
    operations:
      - type: "SELECT"
        columns: []
        where: "id=? AND status=確定"
      - type: "SELECT"
        columns: []
        where: "room_id=? AND start_at<? AND end_at>? AND status IN (申請,確定,変更) AND id!=?"
      - type: "UPDATE"
        columns:
          - name: "status"
            value: "変更"
          - name: "start_at"
            value: "新利用開始日時"
          - name: "end_at"
            value: "新利用終了日時"
          - name: "fee"
            value: "再計算済み利用料金"
          - name: "updated_at"
            value: "NOW()"
        where: "reservation_id=? AND status=確定"
    indexes_needed:
      - columns: ["room_id", "start_at", "end_at", "status"]
        reason: "変更後の日時の重複予約チェックのため"
        access_pattern: "PUT /api/v1/reservations/{id} 重複チェック"
  - name: "operation_rules"
    rdra_info: "運用ルール"
    operations:
      - type: "SELECT"
        columns: []
        where: "room_id=?"
    indexes_needed:
      - columns: ["room_id"]
        reason: "変更後の日時の運用ルール確認のため"
        access_pattern: "PUT /api/v1/reservations/{id} 運用ルール確認"
