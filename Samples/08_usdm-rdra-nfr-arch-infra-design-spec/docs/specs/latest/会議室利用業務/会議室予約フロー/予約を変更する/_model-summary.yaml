  - name: "ReservationEditPage"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "予約情報"
  - name: "EditState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "予約情報"
  - name: "UpdateReservationRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "予約情報"
  - name: "UpdateReservationRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "予約情報"
  - name: "UpdateReservationCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "予約情報"
  - name: "Reservation"
    tier: "tier-backend-api"
    layer: "domain"
