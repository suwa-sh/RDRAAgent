            value: "計算済み利用料金"
          - name: "payment_method_id"
            value: "決済方法ID"
        where: ""
    indexes_needed:
      - columns: ["room_id", "start_at", "end_at", "status"]
        reason: "バーチャル会議室の重複予約チェックのため"
