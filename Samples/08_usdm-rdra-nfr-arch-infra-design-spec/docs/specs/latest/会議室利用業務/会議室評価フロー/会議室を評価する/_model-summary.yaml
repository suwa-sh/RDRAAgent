uc: "会議室を評価する"
business: "会議室利用業務"
buc: "会議室評価フロー"
models:
  - name: "RoomReviewFormPage"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "会議室評価"
  - name: "RoomReviewState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "会議室評価"
  - name: "CreateRoomReviewRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "会議室評価"
  - name: "CreateReviewRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "会議室評価"
  - name: "CreateRoomReviewCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "会議室評価"
  - name: "RoomReview"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "会議室評価"
  - name: "ReviewRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
    rdra_info: "会議室評価"
tables:
  - name: "room_reviews"
    rdra_info: "会議室評価"
    operations:
      - type: "SELECT"
        columns: []
        where: "user_id=? AND room_id=? AND review_type='room'"
      - type: "INSERT"
        columns:
          - name: "review_type"
            value: "room"
          - name: "room_id"
            value: "会議室ID"
          - name: "user_id"
            value: "認証済み利用者ID"
          - name: "reservation_id"
            value: "予約ID"
          - name: "score"
            value: "1-5の評価スコア"
          - name: "comment"
            value: "評価コメント"
          - name: "created_at"
            value: "NOW()"
        where: ""
    indexes_needed:
      - columns: ["user_id", "room_id", "review_type"]
        reason: "重複評価チェックのため利用者・会議室・評価種別で検索"
        access_pattern: "POST /api/v1/reviews 会議室評価重複チェック"
  - name: "rooms"
    rdra_info: "会議室情報"
    operations:
      - type: "UPDATE"
        columns:
          - name: "avg_rating"
            value: "AVG(room_reviews.score WHERE room_id=?)"
        where: "id=?"
    indexes_needed: []
  - name: "usages"
    rdra_info: "会議室利用"
    operations:
      - type: "SELECT"
        columns: []
        where: "user_id=? AND room_id=? AND status='利用終了'"
    indexes_needed: []
kvs: []
object_storage: []
