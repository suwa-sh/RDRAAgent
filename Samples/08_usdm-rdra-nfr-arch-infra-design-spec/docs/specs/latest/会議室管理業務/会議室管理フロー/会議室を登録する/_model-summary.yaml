models:
  - name: "RoomRegistrationForm"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "会議室情報"
  - name: "RoomFormState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "会議室情報"
  - name: "CreateRoomRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "会議室情報"
  - name: "CreateRoomRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "会議室情報"
  - name: "CreateRoomCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "会議室情報"
  - name: "Room"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "会議室情報"
  - name: "RoomRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
