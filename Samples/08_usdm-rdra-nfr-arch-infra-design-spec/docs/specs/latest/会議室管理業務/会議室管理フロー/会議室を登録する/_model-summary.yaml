tables:
  - name: "rooms"
    rdra_info: "会議室情報"
    operations:
      - type: "INSERT"
        columns:
          - name: "room_id"
            value: "UUID 自動採番"
          - name: "owner_id"
            value: "認証済みオーナーID"
          - name: "room_name"
            value: "会議室名"
          - name: "room_type"
            value: "physical（物理会議室）"
          - name: "location"
            value: "所在地"
          - name: "capacity"
            value: "収容人数"
          - name: "price"
            value: "時間単価"
          - name: "status"
            value: "非公開"
        where: ""
    indexes_needed:
      - columns: ["owner_id", "status"]
        reason: "オーナーの会議室一覧と公開状態フィルタ"
        access_pattern: "GET /api/v1/rooms?owner_id={owner_id}"

kvs: []
