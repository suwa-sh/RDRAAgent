components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "OAuth2/OIDC JWT アクセストークン（有効期限15分、IdP発行）"

  parameters:
    OwnerId:
      name: "owner_id"
      in: path
      required: true
      schema:
        type: string
    RoomId:
      name: "room_id"
      in: path
      required: true
      schema:
        type: string
    Page:
      name: "page"
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: "per_page"
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: "バリデーションエラー"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: "認証エラー（トークン無効・期限切れ）"
    Forbidden:
      description: "認可エラー（アクセス権限なし）"
    NotFound:
      description: "リソース未存在"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ===== 共通スキーマ =====

    ErrorResponse:
      type: object
