openapi: "3.1.0"
info:
  title: "会議室シェアリングサービス API"
  version: "1.0.0"
  description: |
    会議室シェアリングサービスの全 UC を統合した OpenAPI 3.1 仕様。
    利用者・会議室オーナー・サービス運営担当者の3ロールに対応する。
    認証は Bearer JWT トークンによる OAuth2/OIDC 方式。

servers:
  - url: "https://api.roomconnect.example.com"
    description: "本番環境"
  - url: "https://api.stg.roomconnect.example.com"
    description: "ステージング環境"

security:
  - bearerAuth: []

tags:
  # オーナー管理業務
  - name: "owners"
    description: "オーナー登録管理フロー — オーナー情報を変更する / オーナー登録を審査する / オーナー登録申請を行う / 退会を申請する"
  # サービス運営業務
  - name: "admin"
    description: "サービス運営管理フロー — オーナー登録審査一覧を確認する / 手数料売上を分析する / 問合せに対応する / 利用履歴を管理する / 利用状況を分析する"
  # 会議室管理業務
  - name: "rooms"
    description: "会議室管理フロー — 会議室を登録する / バーチャル会議室を登録する / 会議室情報を変更する / 公開状態を変更する / 運用ルールを設定する / キャンセルポリシーを設定する / 評価を確認する"
  # 会議室貸出業務
  - name: "rentals"
    description: "会議室貸出管理フロー — 予約を審査する / 鍵の貸出を記録する / 鍵の返却を記録する / 利用者の評価を確認する / 利用者を評価する"
  # 会議室利用業務
  - name: "reservations"
    description: "会議室予約フロー — 会議室を検索する / 詳細を確認する / 予約を申請する / バーチャル会議室を予約する / 予約を許諾する / 予約を変更する / 予約を取り消す / 決済方法を設定する"
  - name: "reviews"
    description: "会議室評価フロー — 会議室を評価する / オーナーを評価する / バーチャル会議室を評価する / バーチャル会議室オーナーを評価する"
  - name: "inquiries"
    description: "問合せ管理 — オーナーへ問合せする / サービスへ問合せする / 問合せに回答する"
  - name: "payment-methods"
    description: "決済方法を設定する"
  # 精算業務
  - name: "settlements"
    description: "オーナー精算フロー / 利用実績管理フロー"
  - name: "internal"
    description: "内部 API（CronJob専用） — バーチャル会議室利用を開始する / 終了する"

paths:
  # ===== オーナー管理業務: オーナー登録管理フロー =====

  /api/v1/owners/applications:
    post:
      tags: ["owners"]
      summary: "オーナー登録申請を行う"
      description: "オーナー登録申請を受け付け、審査待ち状態で作成する"
      operationId: "createOwnerApplication"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnerApplicationRequest"
      responses:
        "201":
          description: "申請受付成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerApplicationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/owners/{owner_id}:
    put:
      tags: ["owners"]
      summary: "オーナー情報を変更する"
      description: "オーナーの登録情報（氏名・連絡先・メールアドレス）を更新する"
      operationId: "updateOwner"
      parameters:
        - $ref: "#/components/parameters/OwnerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnerRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/owners/{owner_id}/review:
    put:
      tags: ["owners", "admin"]
      summary: "オーナー登録を審査する"
      description: "オーナー登録申請を承認または却下する（サービス運営担当者専用）"
      operationId: "reviewOwner"
      parameters:
        - $ref: "#/components/parameters/OwnerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewOwnerRequest"
      responses:
        "200":
          description: "審査完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewOwnerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/owners/{owner_id}/withdrawal:
    post:
      tags: ["owners"]
      summary: "退会を申請する"
      description: "オーナーの退会処理を実行する（会議室の非公開化・IdPユーザー無効化を含む）"
      operationId: "withdrawOwner"
      parameters:
        - $ref: "#/components/parameters/OwnerId"
      responses:
        "200":
          description: "退会処理完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===== サービス運営業務: サービス運営管理フロー =====

  /api/v1/admin/owners:
    get:
      tags: ["admin", "owners"]
      summary: "オーナー登録審査一覧を確認する"
      description: "オーナー一覧取得（審査状態フィルター・キーワード検索・ページネーション）"
      operationId: "listAdminOwners"
      parameters:
        - name: "status"
          in: query
          schema:
            type: string
            enum: ["pending", "approved", "rejected", "withdrawn"]
        - name: "keyword"
          in: query
          schema:
            type: string
        - name: "sort"
          in: query
          schema:
            type: string
            enum: ["registered_at_asc", "registered_at_desc"]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "一覧取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOwnerListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/owners/summary:
    get:
      tags: ["admin", "owners"]
      summary: "オーナー審査状態サマリー取得"
      operationId: "getOwnerReviewSummary"
      responses:
        "200":
          description: "サマリー取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerReviewSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/fee-sales/summary:
    get:
      tags: ["admin"]
      summary: "手数料売上を分析する（集計）"
      description: "手数料売上集計取得（売上分析区分・期間指定）"
      operationId: "getFeeSalesSummary"
      parameters:
        - name: "dimension"
          in: query
          required: true
          schema:
            type: string
            enum: ["room", "lease", "monthly", "owner"]
        - name: "from"
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: "to"
          in: query
          required: true
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "集計成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeSalesSummaryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/fee-sales/export:
    get:
      tags: ["admin"]
      summary: "手数料売上CSVエクスポート"
      operationId: "exportFeeSales"
      parameters:
        - name: "dimension"
          in: query
          required: true
          schema:
            type: string
            enum: ["room", "lease", "monthly", "owner"]
        - name: "from"
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: "to"
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: "CSVダウンロード"
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/usage-analytics:
    get:
      tags: ["admin"]
      summary: "利用状況を分析する"
      description: "利用状況分析取得（集計軸・期間指定、KPI+明細）"
      operationId: "getUsageAnalytics"
      parameters:
        - name: "dimension"
          in: query
          required: true
          schema:
            type: string
            enum: ["user", "room", "period"]
        - name: "from"
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: "to"
          in: query
          required: true
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "分析データ取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageAnalyticsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/usage-history:
    get:
      tags: ["admin"]
      summary: "利用履歴を管理する"
      description: "利用履歴一覧取得（集計軸・期間・利用者・会議室フィルター）"
      operationId: "listAdminUsageHistory"
      parameters:
        - name: "dimension"
          in: query
          schema:
            type: string
            enum: ["user", "room", "period"]
        - name: "from"
          in: query
          schema:
            type: string
            format: date
        - name: "to"
          in: query
          schema:
            type: string
            format: date
        - name: "user_id"
          in: query
          schema:
            type: string
        - name: "room_id"
          in: query
          schema:
            type: string
        - name: "sort"
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "利用履歴取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsageHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/inquiries:
    get:
      tags: ["admin", "inquiries"]
      summary: "問合せに対応する（一覧取得）"
      description: "管理者向け問合せ一覧取得"
      operationId: "listAdminInquiries"
      parameters:
        - name: "status"
          in: query
          schema:
            type: string
            enum: ["pending", "answered", "resolved"]
        - name: "keyword"
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "問合せ一覧取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminInquiryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/inquiries/{inquiry_id}/answer:
    post:
      tags: ["admin", "inquiries"]
      summary: "問合せへの回答送信（状態: 未対応→回答済み）"
      operationId: "answerAdminInquiry"
      parameters:
        - name: "inquiry_id"
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryAnswerRequest"
      responses:
        "200":
          description: "回答送信成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/inquiries/{inquiry_id}/status:
    put:
      tags: ["admin", "inquiries"]
      summary: "問合せ状態更新（状態: 回答済み→対応済み）"
      operationId: "updateAdminInquiryStatus"
      parameters:
        - name: "inquiry_id"
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryStatusUpdateRequest"
      responses:
        "200":
          description: "状態更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===== 会議室管理業務: 会議室管理フロー =====

  /api/v1/rooms:
    post:
      tags: ["rooms"]
      summary: "会議室を登録する"
      description: "会議室を非公開状態で登録する（物理/バーチャル対応）"
      operationId: "createRoom"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags: ["rooms"]
      summary: "会議室を検索する"
      description: "会議室一覧検索（公開状態フィルタ・複数条件絞り込み・ページネーション）"
      operationId: "searchRooms"
      parameters:
        - name: "area"
          in: query
          schema:
            type: string
        - name: "capacity"
          in: query
          schema:
            type: integer
        - name: "price_max"
          in: query
          schema:
            type: integer
        - name: "amenities"
          in: query
          schema:
            type: array
            items:
              type: string
        - name: "avg_rating_min"
          in: query
          schema:
            type: number
        - name: "available_from"
          in: query
          schema:
            type: string
            format: date-time
        - name: "available_to"
          in: query
          schema:
            type: string
            format: date-time
        - name: "room_type"
          in: query
          schema:
            type: string
            enum: ["physical", "virtual"]
        - name: "meeting_tool_type"
          in: query
          schema:
            type: string
            enum: ["Zoom", "Teams", "Google Meet"]
        - name: "max_connections"
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "検索成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/rooms/virtual:
    post:
      tags: ["rooms"]
      summary: "バーチャル会議室を登録する"
      description: "バーチャル会議室（会議ツール種別・会議URL含む）を非公開状態で登録する"
      operationId: "createVirtualRoom"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVirtualRoomRequest"
      responses:
        "201":
          description: "登録成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualRoomCreatedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/rooms/{room_id}:
    get:
      tags: ["rooms"]
      summary: "会議室の詳細を確認する"
      description: "会議室詳細取得（会議室情報・運用ルール・評価一覧含む）"
      operationId: "getRoom"
      parameters:
        - $ref: "#/components/parameters/RoomId"
      responses:
        "200":
          description: "詳細取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: ["rooms"]
      summary: "会議室情報を変更する"
      description: "会議室の基本情報（名称・価格・設備等）を更新する"
      operationId: "updateRoom"
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomRequest"
      responses:
        "200":
          description: "更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/rooms/{room_id}/status:
    put:
      tags: ["rooms"]
      summary: "会議室の公開状態を変更する"
      description: "会議室の公開状態を変更する（公開中/非公開の切り替え）"
      operationId: "updateRoomStatus"
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomStatusRequest"
      responses:
        "200":
          description: "状態変更成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/rooms/{room_id}/operation-rules:
    put:
      tags: ["rooms"]
      summary: "運用ルールを設定する"
      description: "会議室の運用ルール（利用可能時間・最低最大時間・貸出可否）を設定する"
      operationId: "setOperationRules"
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetOperationRulesRequest"
      responses:
        "200":
          description: "設定成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationRulesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/rooms/{room_id}/cancel-policy:
    put:
      tags: ["rooms"]
      summary: "キャンセルポリシーを設定する"
      description: "会議室のキャンセルポリシーを設定する"
      operationId: "setCancelPolicy"
      parameters:
        - $ref: "#/components/parameters/RoomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCancelPolicyRequest"
      responses:
        "200":
          description: "設定成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelPolicyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/rooms/{room_id}/reviews:
    get:
      tags: ["rooms"]
      summary: "会議室の評価を確認する"
      description: "会議室の評価一覧と平均スコアを取得する"
      operationId: "listRoomReviews"
      parameters:
        - $ref: "#/components/parameters/RoomId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: "評価一覧取得成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomReviewListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

