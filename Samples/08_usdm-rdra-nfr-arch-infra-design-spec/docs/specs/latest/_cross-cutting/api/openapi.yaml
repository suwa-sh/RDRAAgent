          type: string
        owner_settlement_id:
          type: string
        status:
          type: string
          enum: ["processing"]
        message_id:
          type: string
          description: "SQSメッセージID（冪等性確認用）"

    SettlementExecuteStatusResponse:
      type: object
      required: [settlement_id, status]
      properties:
        settlement_id:
          type: string
        status:
          type: string
          enum: ["calculated", "processing", "paid", "failed"]
        payment_completed_at:
          type: string
          format: date-time
        error_message:
          type: string

    OwnerSettlementListResponse:
      type: object
      required: [total_paid_amount, settlements, pagination]
      properties:
        total_paid_amount:
          type: integer
        settlements:
          type: array
          items:
            $ref: "#/components/schemas/OwnerSettlementSummaryItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    OwnerSettlementSummaryItem:
      type: object
      required: [settlement_id, target_month, settlement_amount, status]
      properties:
        settlement_id:
          type: string
        target_month:
          type: string
        settlement_amount:
          type: integer
        status:
          type: string
          enum: ["pending", "calculated", "processing", "paid"]

    OwnerSettlementDetailResponse:
      type: object
      required: [settlement_id, target_month, total_usage_amount, total_fee_amount, settlement_amount, status]
      properties:
        settlement_id:
          type: string
        target_month:
          type: string
        total_usage_amount:
          type: integer
        total_fee_amount:
          type: integer
        settlement_amount:
          type: integer
        status:
          type: string
          enum: ["pending", "calculated", "processing", "paid"]
        payment_date:
          type: string
          format: date
        payment_gateway_id:
          type: string

    SalesSummaryResponse:
      type: object
      required: [summary, items]
      properties:
        summary:
          type: object
          required: [total_amount, total_count]
          properties:
            total_amount:
              type: integer
            total_count:
              type: integer
            growth_rate:
              type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/SalesSummaryItem"

    SalesSummaryItem:
      type: object
      required: [label, amount, count]
      properties:
        label:
          type: string
        amount:
          type: integer
        count:
          type: integer
        growth_rate:
          type: number

    OwnerUsageStatsResponse:
      type: object
      required: [dimension, period, items, kpi]
      properties:
        dimension:
          type: string
          enum: ["room", "period"]
        period:
          type: object
          properties:
            from:
              type: string
            to:
              type: string
        items:
          type: array
          items: {}
        kpi:
          type: object
          properties:
            total_count:
              type: integer
            total_hours:
              type: number

    UserReviewListResponse:
      type: object
      required: [summary, items, pagination]
      properties:
        summary:
          type: object
          required: [average_score, total_count]
          properties:
            average_score:
              type: number
              minimum: 1
              maximum: 5
            total_count:
              type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/UserReviewItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    UserReviewItem:
      type: object
      required: [review_id, user_id, score, reviewed_at]
      properties:
        review_id:
          type: string
        user_id:
          type: string
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        reviewed_at:
          type: string
          format: date-time

    # ===== 内部 API =====

    StartVirtualUsageRequest:
      type: object
      required: [reservationId]
      properties:
        reservationId:
          type: string

    StartVirtualUsageResponse:
      type: object
      required: [reservationId, usageId, startedAt, alreadyStarted]
      properties:
        reservationId:
          type: string
        usageId:
          type: string
        startedAt:
          type: string
          format: date-time
        alreadyStarted:
          type: boolean
          description: "冪等性保証: 既に開始済みの場合 true"

    EndVirtualUsageRequest:
      type: object
      required: [usageId]
      properties:
        usageId:
          type: string

    EndVirtualUsageResponse:
      type: object
      required: [usageId, alreadyEnded]
      properties:
        usageId:
          type: string
        endedAt:
          type: string
          format: date-time
        usageMinutes:
          type: integer
        alreadyEnded:
          type: boolean
          description: "冪等性保証: 既に終了済みの場合 true"
