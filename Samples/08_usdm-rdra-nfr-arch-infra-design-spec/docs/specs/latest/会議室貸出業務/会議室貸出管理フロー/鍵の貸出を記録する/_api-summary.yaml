        required: true
      - name: "keyId"
        type: "string"
        required: true
      - name: "keyStatus"
        type: "string"
        required: true
      - name: "usageId"
        type: "string"
        required: true
      - name: "usageStatus"
        type: "string"
        required: true
      - name: "lentAt"
        type: "string"
        required: true
