            value: "NOW()"
        where: ""
    indexes_needed:
      - columns: ["target_id", "status"]
        reason: "オーナー宛の未対応問合せ一覧"
        access_pattern: "GET /api/v1/inquiries?targetId={owner_id}&status=pending"

