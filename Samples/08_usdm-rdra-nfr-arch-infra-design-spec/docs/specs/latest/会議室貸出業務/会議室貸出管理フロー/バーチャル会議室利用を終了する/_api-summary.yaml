uc: "バーチャル会議室利用を終了する"
business: "会議室貸出業務"
buc: "会議室貸出管理フロー"
endpoints:
  - method: "POST"
    path: "/internal/v1/virtual-usages/end"
    summary: "バーチャル会議室利用終了（CronJob専用内部API）"
    request_schema: "EndVirtualUsageRequest"
    response_schema: "EndVirtualUsageResponse"
    tags: ["internal", "virtual-rooms", "rental"]
async_events: []
schemas:
  - name: "EndVirtualUsageRequest"
    properties:
      - name: "usageId"
        type: "string"
        required: true
  - name: "EndVirtualUsageResponse"
    properties:
      - name: "usageId"
        type: "string"
        required: true
      - name: "endedAt"
        type: "string"
        required: false
      - name: "usageMinutes"
        type: "integer"
        required: false
      - name: "alreadyEnded"
        type: "boolean"
        required: true
