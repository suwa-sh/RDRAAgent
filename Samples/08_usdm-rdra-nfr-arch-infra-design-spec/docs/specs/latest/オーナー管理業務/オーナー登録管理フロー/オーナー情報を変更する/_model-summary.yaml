            value: "変更後の氏名"
          - name: "phone"
            value: "変更後の連絡先"
          - name: "email"
            value: "変更後のメールアドレス"
          - name: "updated_at"
            value: "NOW()"
        where: "owner_id = {owner_id}"
    indexes_needed:
      - columns: ["owner_id"]
        reason: "PK による単一レコード取得"
        access_pattern: "PUT /api/v1/owners/{owner_id}"

