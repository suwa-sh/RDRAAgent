uc: "オーナー登録申請を行う"
business: "オーナー管理業務"
buc: "オーナー登録管理フロー"

models:
  - name: "OwnerRegistrationForm"
    tier: "tier-frontend-user"
    layer: "view"
    type: "view-model"
    rdra_info: "オーナー情報"
  - name: "RegistrationState"
    tier: "tier-frontend-user"
    layer: "state"
    type: "state"
    rdra_info: "オーナー情報"
  - name: "CreateOwnerApplicationRequest"
    tier: "tier-frontend-user"
    layer: "api-client"
    type: "request"
    rdra_info: "オーナー情報"
  - name: "CreateOwnerApplicationRequestDTO"
    tier: "tier-backend-api"
    layer: "presentation"
    type: "request-dto"
    rdra_info: "オーナー情報"
  - name: "CreateOwnerApplicationCommand"
    tier: "tier-backend-api"
    layer: "usecase"
    type: "command"
    rdra_info: "オーナー情報"
  - name: "Owner"
    tier: "tier-backend-api"
    layer: "domain"
    type: "entity"
    rdra_info: "オーナー情報"
  - name: "OwnerRecord"
    tier: "tier-backend-api"
    layer: "gateway"
    type: "record"
    rdra_info: "オーナー情報"

tables:
  - name: "owners"
    rdra_info: "オーナー情報"
    operations:
      - type: "SELECT"
        columns: []
        where: "email = {email}"
      - type: "INSERT"
        columns:
          - name: "owner_id"
            value: "UUID 自動採番"
          - name: "name"
            value: "申請者の氏名"
          - name: "phone"
            value: "申請者の連絡先"
          - name: "email"
            value: "申請者のメールアドレス"
          - name: "status"
            value: "審査待ち"
          - name: "applied_at"
            value: "NOW()"
        where: ""
    indexes_needed:
      - columns: ["email"]
        reason: "メールアドレス重複チェック"
        access_pattern: "POST /api/v1/owners/applications"

kvs: []
object_storage: []
