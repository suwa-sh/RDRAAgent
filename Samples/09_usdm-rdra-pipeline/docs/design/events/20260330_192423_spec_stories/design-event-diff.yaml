components:
  common:
    - name: "ProcessingState"
      description: "Async processing spinner with optional progress bar"
      props:
        - "message: string"
        - "progress: number (optional)"
    - name: "SearchFilterPanel"
      description: "Reusable search/filter input panel"
      props:
        - "filters: FilterConfig[]"
        - "onFilter: function"
        - "onReset: function"
    - name: "PaginatedList"
      description: "Paginated list wrapper with prev/next navigation"
      props:
        - "items: ReactNode[]"
        - "page: number"
        - "totalPages: number"
        - "onPageChange: function"
    - name: "EntityEditForm"
      description: "Generic entity edit form with field configuration"
      props:
        - "fields: FieldConfig[]"
        - "onSubmit: function"
        - "initialValues: object"
        - "submitLabel: string"

