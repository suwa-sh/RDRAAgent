schema_version: "1.0"
artifact_type: "decision_record"
skill_type: "design_system"
artifact_id: "design-decision-001"
title: "ブランドアイデンティティ: 信頼性と使いやすさ重視のデザイン方向性"
status: "approved"
generated_at: "2026-03-30T18:42:57"

context: |
  貸し会議室サービスは C2C シェアリングモデルであり、
  利用者とオーナーの双方に信頼感を与えるデザインが必要。
  3種のアクター（利用者・オーナー・運営担当者）ごとにポータルを分離し、
  それぞれの業務に最適化された UI を提供する。

decision: |
  プライマリカラーにブルー系を採用し、信頼性・安心感を表現する。
  3ポータル（利用者・オーナー・運営）をアクセントカラーで視覚的に区別する。
  トーンは「丁寧で親しみやすい」とし、専門用語を避けた平易な表現を使用する。
  3層デザイントークン（primitive→semantic→component）でテーマの一貫性を保つ。

consequences:
  positive:
    - "ブルー系は信頼性の印象を与え、金銭取引を含むサービスに適している"
    - "ポータル別のアクセントカラーにより、現在のコンテキストが直感的に分かる"
    - "3層トークンにより、ブランド変更時の影響範囲を最小化できる"
  negative:
    - "3ポータル分のカラーバリエーション管理が必要"
    - "トークン3層構造は初期設計コストが高い"

alternatives_considered:
  - name: "単一ポータル + ロール切替"
    reason_rejected: "3アクターの業務が大きく異なり、単一 UI での最適化が困難"
  - name: "グリーン系プライマリカラー"
    reason_rejected: "金銭取引サービスではブルー系の方が信頼感を与えやすい"
