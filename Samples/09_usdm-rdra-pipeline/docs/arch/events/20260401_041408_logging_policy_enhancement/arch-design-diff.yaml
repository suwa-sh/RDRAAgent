system_architecture:
  cross_tier_policies:
    - id: "CTP-032"
      name: "トレーサビリティ ID 体系"
      description: "OpenTelemetry 標準 (trace_id + span_id) をティア単位で発行する。session_id, user_id, 業務エンティティ ID（予約ID・精算ID等）をログ context に含め、リクエスト横断・業務横断の追跡を可能にする"
      reason: "NFR C.1.3.1 監視範囲(Lv3: アプリケーション監視)、NFR C.6.1.2 ログ種別(Lv3) への対応。分散システムの横断トレーサビリティに OpenTelemetry 標準を採用"
      source_model: "NFR C.1.3.1, NFR C.6.1.1, NFR C.6.1.2"
      confidence: "medium"
    - id: "CTP-033"
      name: "ログ運用方針"
      description: "非同期ログ出力を原則とし、DEBUG/TRACE は本番環境で無効をデフォルトとする。ログローテーションはサイズ（100MB）+日次の併用、保持期間はアクセスログ/診断ログは NFR C.6.1 準拠、監査ログは NFR E.7.1 準拠（最長）とする。再起動なしの動的ログレベル変更を可能にし、ログ出力先は stdout/stderr に統一する"
      reason: "NFR C.6.1.1 ログ保管期間(Lv4: 1年)、NFR E.7.1.1 監査ログ(Lv2)、NFR C.3.1.1 障害検知方式(Lv2)、NFR B.2.1.1 レスポンスタイム(Lv3) への対応。ログ運用設計のベストプラクティスを体系化"
      source_model: "NFR C.6.1.1, NFR E.7.1.1, NFR C.3.1.1, NFR B.2.1.1"
      confidence: "medium"
  cross_tier_rules:
    - id: "CTR-006"
      name: "ログアンチパターン防止"
      description: "多重ログ禁止（集約ポイントで1回のみ出力）、catch握り潰し禁止（catch内は必ずログ出力or再スロー）、機密情報マスキング必須（PII・認証情報はマスキング/ハッシュ化）、ループ内逐次ログ禁止（サマリログを使用）、構造化ログ強制（JSON形式の必須フィールドを遵守）、タイムスタンプは UTC（ISO 8601）統一"
      reason: "NFR C.6.1.2 ログ種別(Lv3)、NFR E.6.1.1 データ暗号化(Lv1)、NFR B.2.1.1 レスポンスタイム(Lv3) への対応。実装時のアンチパターンを体系的に防止"
      source_model: "NFR C.6.1.2, NFR E.6.1.1, NFR B.2.1.1"
      confidence: "medium"

