schema_version: "1.0"
artifact_type: "decision_record"
skill_type: "architecture"
artifact_id: "arch-decision-003"
title: "エラーハンドリング伝播方針"
status: "approved"
generated_at: "2026-04-01T04:14:08"
context: |
  既存の CLR-002（Backend API）および CLR-004（Worker）は「domain例外→HTTP/ジョブステータス変換」の1行のみで、
  エラーログの集約ポイント、多重ログ防止、cause chain の保持方針が不明確だった。
  複数レイヤーで同一例外をログ出力する多重ログや、catch内で何もしない握り潰しが発生するリスクがあった。
  また、gateway層の依存関係ログとusecase層のエラーログの責務境界が不明確だった。
decision: |
  usecase層を集約ポイントとし、エラーログは1回だけ出力する。
  gateway層は外部DB/API通信エラーを依存関係ログとして記録する（エラーログとは別カテゴリ）。
  中間レイヤー（repository）はキャッチ→ラップ→再スローのみで、ログを出力しない。
  例外をラップする際は元例外をcauseフィールドに保持し、集約ポイントのログ出力時にcause chain全体をcontextに含める。
  catch内では必ずログ出力または再スローを行い、空catchを禁止する。
consequences:
  positive:
    - "エラーログの出力ポイントが明確になり、多重ログが防止される"
    - "cause chain により障害の根本原因を迅速に特定できる"
    - "gateway の依存関係ログとの責務境界が明確になる"
  negative:
    - "中間レイヤーでのデバッグ情報が減少する（DEBUG レベルで補完可能）"
    - "全レイヤーの開発者が伝播方針を理解する必要がある"
alternatives_considered:
  - name: "各レイヤーでログ出力"
    reason_rejected: "同一例外が複数回ログ出力される多重ログ問題が発生し、ログ分析の効率が低下する"
  - name: "presentation でのみログ出力"
    reason_rejected: "業務コンテキスト（どのユースケースで発生したか）が不足し、障害分析が困難になる"
