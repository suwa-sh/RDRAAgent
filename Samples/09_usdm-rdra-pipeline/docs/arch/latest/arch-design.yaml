              source_model: "条件: 精算条件, 情報: 利用履歴, 手数料情報"
              confidence: "high"
          rules: []
        - id: "L-worker-gateway"
          name: "ゲートウェイ層"
          responsibility: "データストアアクセス、決済機関連携（Backend API と共有）"
          allowed_dependencies:
            - "L-worker-domain"
          policies:
