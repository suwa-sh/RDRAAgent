openapi: "3.1.0"
info:
  title: "RoomConnect API"
  version: "1.0.0"
  description: "貸し会議室サービス RoomConnect の統合 API 仕様"
servers:
  - url: "https://api.roomconnect.example.com"
    description: "Production"
security:
  - bearerAuth: []
tags:
  - name: "オーナー管理業務"
    description: "オーナー登録・審査・退会"
  - name: "会議室管理業務"
    description: "会議室登録・運用ルール・評価確認"
  - name: "予約業務"
    description: "会議室検索・予約・変更・取消"
  - name: "会議室貸出業務"
    description: "鍵管理・利用許諾・問合せ"
  - name: "評価業務"
    description: "会議室評価・ホスト評価・利用者評価"
  - name: "サービス運営業務"
    description: "手数料分析・運用管理・利用分析・問合せ対応"
  - name: "精算業務"
    description: "精算計算・精算実行・精算確認"
paths:
  /api/v1/terms:
    get:
      tags: ["オーナー管理業務"]
      summary: "サービス規約を取得する"
      operationId: "getTerms"
      responses:
        "200":
          description: "規約内容"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceTermsResponse"
  /api/v1/owners:
    post:
      tags: ["オーナー管理業務"]
      summary: "オーナーを登録する"
      operationId: "createOwner"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnerRequest"
      responses:
        "201":
          description: "オーナー登録完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
        "400":
          description: "バリデーションエラー"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/owners/{owner_id}/actions/apply:
    post:
      tags: ["オーナー管理業務"]
      summary: "オーナー申請を行う"
      operationId: "applyOwner"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
      responses:
        "200":
          description: "申請完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
  /api/v1/owners/{owner_id}/actions/review:
    post:
      tags: ["オーナー管理業務"]
      summary: "オーナー登録を審査する"
      operationId: "reviewOwner"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewOwnerRequest"
      responses:
        "200":
          description: "審査結果"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
  /api/v1/owners/{owner_id}/actions/withdraw:
    post:
      tags: ["オーナー管理業務"]
      summary: "オーナー退会を申請する"
      operationId: "withdrawOwner"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
      responses:
        "200":
          description: "退会申請完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
  /api/v1/owners/{owner_id}/actions/process-withdrawal:
    post:
      tags: ["オーナー管理業務"]
      summary: "退会を処理する"
      operationId: "processWithdrawal"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
      responses:
        "200":
          description: "退会処理完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
  /api/v1/owners/{owner_id}/profile:
    put:
      tags: ["オーナー管理業務"]
      summary: "プロフィールを編集する"
      operationId: "updateOwnerProfile"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnerProfileRequest"
      responses:
        "200":
          description: "プロフィール更新完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerResponse"
  /api/v1/rooms:
    get:
      tags: ["予約業務"]
      summary: "会議室を検索する"
      operationId: "searchRooms"
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたり件数"
        - name: area_min
          in: query
          schema:
            type: number
          description: "最小広さ(平方メートル)"
        - name: area_max
          in: query
          schema:
            type: number
          description: "最大広さ(平方メートル)"
        - name: price_min
          in: query
          schema:
            type: number
          description: "最小価格(円/時)"
        - name: price_max
          in: query
          schema:
            type: number
          description: "最大価格(円/時)"
        - name: min_rating
          in: query
          schema:
            type: number
          description: "最低評価点"
      responses:
        "200":
          description: "会議室一覧"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRoomResponse"
    post:
      tags: ["会議室管理業務"]
      summary: "会議室を登録する"
      operationId: "createRoom"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: "会議室登録完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
  /api/v1/rooms/{room_id}/rules:
    put:
      tags: ["会議室管理業務"]
      summary: "運用ルールを設定する"
      operationId: "updateRoomRules"
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "会議室ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomRulesRequest"
      responses:
        "200":
          description: "運用ルール更新完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomRulesResponse"
  /api/v1/rooms/{room_id}/reviews:
    get:
      tags: ["会議室管理業務"]
      summary: "会議室の評価一覧を取得する"
      operationId: "getRoomReviews"
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "会議室ID"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたり件数"
      responses:
        "200":
          description: "評価一覧"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReviewResponse"
  /api/v1/reservations:
    post:
      tags: ["予約業務"]
      summary: "会議室を予約する"
      operationId: "createReservation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: "予約作成完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
  /api/v1/reservations/{reservation_id}:
    put:
      tags: ["予約業務"]
      summary: "予約を変更する"
      operationId: "updateReservation"
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "予約ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationRequest"
      responses:
        "200":
          description: "予約変更完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
  /api/v1/reservations/{reservation_id}/actions/cancel:
    post:
      tags: ["予約業務"]
      summary: "予約を取消する"
      operationId: "cancelReservation"
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "予約ID"
      responses:
        "200":
          description: "予約取消完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
  /api/v1/reservations/{reservation_id}/actions/approve:
    post:
      tags: ["会議室貸出業務"]
      summary: "利用許諾を判定する"
      operationId: "approveReservation"
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "予約ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveReservationRequest"
      responses:
        "200":
          description: "利用許諾結果"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
  /api/v1/reservations/{reservation_id}/actions/receive-key:
    post:
      tags: ["会議室貸出業務"]
      summary: "鍵を受け取る"
      operationId: "receiveKey"
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "予約ID"
      responses:
        "200":
          description: "鍵受取確認完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyResponse"
  /api/v1/reservations/{reservation_id}/actions/lend-key:
    post:
      tags: ["会議室貸出業務"]
      summary: "鍵を貸出する"
      operationId: "lendKey"
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "予約ID"
      responses:
        "200":
          description: "鍵貸出完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyResponse"
  /api/v1/reservations/{reservation_id}/actions/return-key:
    post:
      tags: ["会議室貸出業務"]
      summary: "鍵を返却する"
      operationId: "returnKey"
      parameters:
        - name: reservation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "予約ID"
      responses:
        "200":
          description: "鍵返却完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyResponse"
  /api/v1/room-reviews:
    post:
      tags: ["評価業務"]
      summary: "会議室を評価する"
      operationId: "createRoomReview"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: "評価登録完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
  /api/v1/host-reviews:
    post:
      tags: ["評価業務"]
      summary: "ホストを評価する"
      operationId: "createHostReview"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: "評価登録完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
  /api/v1/user-reviews:
    post:
      tags: ["会議室貸出業務"]
      summary: "利用者を評価する"
      operationId: "createUserReview"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: "評価登録完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
  /api/v1/owners/{owner_id}/reviews:
    get:
      tags: ["評価業務"]
      summary: "オーナーの評価結果を確認する"
      operationId: "getOwnerReviews"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
      responses:
        "200":
          description: "評価結果一覧"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReviewResponse"
  /api/v1/inquiries:
    post:
      tags: ["会議室貸出業務"]
      summary: "オーナーに問合せる"
      operationId: "createInquiry"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryRequest"
      responses:
        "201":
          description: "問合せ送信完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
  /api/v1/inquiries/{inquiry_id}/actions/reply:
    post:
      tags: ["会議室貸出業務"]
      summary: "問合せに回答する"
      operationId: "replyToInquiry"
      parameters:
        - name: inquiry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "問合せID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInquiryRequest"
      responses:
        "200":
          description: "回答完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
  /api/v1/service-inquiries:
    post:
      tags: ["サービス運営業務"]
      summary: "サービスに問合せる"
      operationId: "createServiceInquiry"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryRequest"
      responses:
        "201":
          description: "問合せ送信完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
  /api/v1/service-inquiries/{inquiry_id}/actions/reply:
    post:
      tags: ["サービス運営業務"]
      summary: "サービス問合せに回答する"
      operationId: "replyToServiceInquiry"
      parameters:
        - name: inquiry_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "問合せID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInquiryRequest"
      responses:
        "200":
          description: "回答完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
  /api/v1/analytics/commissions:
    get:
      tags: ["サービス運営業務"]
      summary: "手数料売上を分析する"
      operationId: "getCommissionAnalytics"
      parameters:
        - name: period_from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "分析期間開始日"
        - name: period_to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "分析期間終了日"
      responses:
        "200":
          description: "手数料分析データ"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionAnalyticsResponse"
  /api/v1/analytics/dashboard:
    get:
      tags: ["サービス運営業務"]
      summary: "運用管理ダッシュボードデータを取得する"
      operationId: "getDashboard"
      responses:
        "200":
          description: "ダッシュボードデータ"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
  /api/v1/usage-history:
    get:
      tags: ["サービス運営業務"]
      summary: "利用履歴を管理する"
      operationId: "getUsageHistory"
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: "ページ番号"
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
          description: "1ページあたり件数"
      responses:
        "200":
          description: "利用履歴一覧"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsageHistoryResponse"
  /api/v1/analytics/usage:
    get:
      tags: ["サービス運営業務"]
      summary: "利用状況を分析する"
      operationId: "getUsageAnalytics"
      parameters:
        - name: period_from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "分析期間開始日"
        - name: period_to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "分析期間終了日"
      responses:
        "200":
          description: "利用状況分析データ"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageAnalyticsResponse"
  /api/v1/owners/{owner_id}/settlements:
    get:
      tags: ["精算業務"]
      summary: "精算結果を確認する"
      operationId: "getOwnerSettlements"
      parameters:
        - name: owner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: "オーナーID"
      responses:
        "200":
          description: "精算結果一覧"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSettlementResponse"
  /api/v1/settlements/actions/calculate:
    post:
      tags: ["精算業務"]
      summary: "精算額を計算する"
      operationId: "calculateSettlements"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateSettlementRequest"
      responses:
        "200":
          description: "精算額計算完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementCalculationResponse"
  /api/v1/settlements/actions/execute:
    post:
      tags: ["精算業務"]
      summary: "精算を実行する"
      operationId: "executeSettlements"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteSettlementRequest"
      responses:
        "200":
          description: "精算実行完了"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementExecutionResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "IdP が発行した JWT トークン"
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "エラーコード"
        message:
          type: string
          description: "エラーメッセージ"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: "エラー対象フィールド"
              message:
                type: string
                description: "フィールドエラーメッセージ"
        trace_id:
          type: string
          description: "リクエストトレースID"
    ServiceTermsResponse:
      type: object
      required:
        - terms_id
        - terms_name
        - content
        - effective_date
      properties:
        terms_id:
          type: string
          format: uuid
          description: "規約ID"
        terms_name:
          type: string
          description: "規約名"
        content:
          type: string
          description: "規約内容"
        effective_date:
          type: string
          format: date
          description: "適用開始日"
    CreateOwnerRequest:
      type: object
      required:
        - name
        - email
        - phone
      properties:
        name:
          type: string
          description: "氏名"
        email:
          type: string
          format: email
          description: "メールアドレス"
        phone:
          type: string
          description: "電話番号"
        profile:
          type: string
          description: "プロフィール"
    UpdateOwnerProfileRequest:
      type: object
      properties:
        name:
          type: string
          description: "氏名"
        email:
          type: string
          format: email
          description: "メールアドレス"
        phone:
          type: string
          description: "電話番号"
        profile:
          type: string
          description: "プロフィール"
    ReviewOwnerRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - "approve"
            - "reject"
          description: "審査結果(承認/却下)"
        reason:
          type: string
          description: "審査理由"
    OwnerResponse:
      type: object
      required:
        - owner_id
        - name
        - email
        - status
      properties:
        owner_id:
          type: string
          format: uuid
          description: "オーナーID"
        name:
          type: string
          description: "氏名"
        email:
          type: string
          format: email
          description: "メールアドレス"
        phone:
          type: string
          description: "電話番号"
        profile:
          type: string
          description: "プロフィール"
        status:
          type: string
