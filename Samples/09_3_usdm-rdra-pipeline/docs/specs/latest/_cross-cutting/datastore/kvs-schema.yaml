version: "1.0"
datastore: "kvs"

key_patterns:
  - pattern: "session:user:{user_id}"
    purpose: "session"
    value_type: "JSON (session data)"
    ttl: "24h"
    used_by:
      - "会議室を照会する"
      - "会議室を予約する"
    description: "利用者セッションデータ。ログイン後24時間有効"
  - pattern: "session:owner:{owner_id}"
    purpose: "session"
    value_type: "JSON (session data)"
    ttl: "24h"
    used_by:
      - "会議室を登録する"
      - "利用許諾を判定する"
    description: "オーナーセッションデータ。ログイン後24時間有効"
  - pattern: "session:admin:{admin_id}"
    purpose: "session"
    value_type: "JSON (session data)"
    ttl: "8h"
    used_by:
      - "オーナー登録を審査する"
      - "精算額を計算する"
    description: "管理者セッションデータ。ログイン後8時間有効"
  - pattern: "idempotency:{idempotency_key}"
    purpose: "lock"
    value_type: "JSON (previous response)"
    ttl: "24h"
    used_by:
      - "会議室を予約する"
      - "精算を実行する"
    description: "冪等キー管理。重複リクエストの検知と前回レスポンスの返却"
  - pattern: "cache:room:{room_id}"
    purpose: "cache"
    value_type: "JSON (room detail)"
    ttl: "15m"
    used_by:
      - "会議室を照会する"
    description: "会議室詳細キャッシュ。15分有効"
  - pattern: "ratelimit:{actor_type}:{actor_id}"
    purpose: "rate-limit"
    value_type: "integer (request count)"
    ttl: "1m"
    used_by:
      - "会議室を照会する"
    description: "APIレート制限カウンター。1分あたりのリクエスト数"
