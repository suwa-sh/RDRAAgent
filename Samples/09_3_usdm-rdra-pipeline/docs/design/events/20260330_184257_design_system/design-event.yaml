components:
  ui:
    - name: "Button"
      variants:
        - "default"
        - "secondary"
        - "outline"
        - "ghost"
        - "destructive"
      sizes:
        - "sm"
        - "md"
        - "lg"
    - name: "Badge"
      variants:
        - "default"
        - "success"
        - "warning"
        - "destructive"
        - "info"
        - "outline"
    - name: "Card"
      variants:
        - "default"
        - "hoverable"
    - name: "Input"
      variants:
        - "default"
        - "error"
    - name: "Icon"
      variants:
        - "default"
  domain:
    - name: "RoomCard"
      description: "会議室情報をカード表示。画像・名前・広さ・価格・評価を表示"
      screens:
        - "会議室検索画面"
      props:
        - "name: string"
        - "area: string"
        - "price: number"
        - "rating: number"
        - "imageUrl: string"
        - "location: string"
        - "available: boolean"
      variants:
        - "compact"
        - "detailed"
    - name: "SearchFilter"
      description: "会議室検索用フィルター。広さ・価格帯・機能性・評価で絞り込み"
      screens:
        - "会議室検索画面"
      props:
        - "onFilter: function"
        - "areaRange: [number, number]"
        - "priceRange: [number, number]"
        - "minRating: number"
    - name: "BookingCalendar"
      description: "予約日時選択カレンダー。利用開始/終了時刻を選択"
      screens:
        - "予約申込画面"
        - "予約変更画面"
      props:
        - "selectedDate: Date"
        - "startTime: string"
        - "endTime: string"
        - "onSelect: function"
    - name: "StarRating"
      description: "星評価表示/入力。SVG ベースでインタラクティブ"
      screens:
        - "会議室評価画面"
        - "ホスト評価画面"
        - "評価確認画面"
        - "会議室検索画面"
      props:
        - "value: number"
        - "max: number"
        - "readonly: boolean"
        - "onChange: function"
    - name: "PriceDisplay"
      description: "金額表示。通貨記号・桁区切り対応"
      screens:
        - "会議室検索画面"
        - "予約申込画面"
        - "精算結果確認画面"
      props:
        - "amount: number"
        - "currency: string"
        - "size: string"
    - name: "OwnerStatusBadge"
      description: "オーナー申請状態を Badge で表示"
      screens:
        - "オーナー審査画面"
      props:
        - "status: string"
    - name: "ReservationStatusBadge"
      description: "予約状態を Badge で表示"
      screens:
        - "予約申込画面"
        - "予約変更画面"
        - "利用許諾画面"
      props:
        - "status: string"
    - name: "InquiryStatusBadge"
      description: "問合せ状態を Badge で表示"
      screens:
        - "問合せ送信画面"
        - "問合せ回答画面"
      props:
        - "status: string"
    - name: "InquiryThread"
      description: "問合せスレッド表示。送信/回答のメッセージ一覧"
      screens:
        - "問合せ送信画面"
        - "問合せ回答画面"
        - "サービス問合せ画面"
      props:
        - "messages: array"
        - "onSend: function"
    - name: "SettlementSummary"
      description: "精算サマリーカード。売上・手数料・支払額を表示"
      screens:
        - "精算結果確認画面"
        - "精算処理画面"
      props:
        - "revenue: number"
        - "commission: number"
        - "payout: number"
        - "period: string"
    - name: "DashboardChart"
      description: "ダッシュボード用チャート。利用状況・手数料分析"
      screens:
        - "運用管理ダッシュボード"
        - "手数料分析画面"
        - "利用状況分析画面"
      props:
        - "data: array"
        - "type: string"
        - "title: string"

screens:
  - name: "会議室検索画面"
    portal: "user"
    route: "/rooms"
    components:
      - "SearchFilter"
      - "RoomCard"
      - "StarRating"
      - "PriceDisplay"
  - name: "予約申込画面"
    portal: "user"
    route: "/rooms/:id/book"
    components:
      - "BookingCalendar"
      - "PriceDisplay"
      - "ReservationStatusBadge"
  - name: "予約変更画面"
    portal: "user"
    route: "/reservations/:id/edit"
    components:
      - "BookingCalendar"
      - "ReservationStatusBadge"
  - name: "予約取消画面"
    portal: "user"
    route: "/reservations/:id/cancel"
    components:
