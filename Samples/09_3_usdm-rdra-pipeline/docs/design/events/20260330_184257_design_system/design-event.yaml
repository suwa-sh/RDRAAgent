states:
  - model: "オーナー申請状態"
    entries:
      - state: "未申請"
        label: "未申請"
        color: "gray"
      - state: "申請中"
        label: "申請中"
        color: "blue"
      - state: "審査中"
        label: "審査中"
        color: "amber"
      - state: "承認"
        label: "承認"
        color: "green"
      - state: "却下"
        label: "却下"
        color: "red"
      - state: "退会"
        label: "退会"
        color: "gray"
  - model: "予約状態"
    entries:
      - state: "仮予約"
        label: "仮予約"
        color: "amber"
      - state: "確定"
        label: "確定"
        color: "green"
      - state: "変更"
        label: "変更中"
        color: "blue"
      - state: "利用中"
        label: "利用中"
        color: "violet"
      - state: "利用完了"
        label: "利用完了"
        color: "green"
      - state: "取消"
        label: "取消"
        color: "red"
  - model: "問合せ状態"
    entries:
      - state: "受付"
        label: "受付"
        color: "blue"
      - state: "対応中"
        label: "対応中"
        color: "amber"
      - state: "回答済"
        label: "回答済"
        color: "green"
      - state: "完了"
        label: "完了"
        color: "gray"

nfr_decisions:
  - nfr: "可用性 A.1.1.1 (Lv3: 24h運用)"
    decision: "全画面にエラー状態・ローディング状態・リトライUIを実装"
  - nfr: "性能 B.1.1.1 (Lv3: 同時1万)"
    decision: "一覧画面にページネーション実装。仮想スクロールは不要（1ページ20件）"
  - nfr: "性能 B.2.1.1 (Lv3: 5秒以内)"
    decision: "Skeleton UI でパーシーブドパフォーマンス改善。SSR 対応画面は初回表示を高速化"
  - nfr: "セキュリティ E.5.2.1 (Lv2: RBAC)"
    decision: "ポータル別ナビゲーション。data-portal 属性でテーマ切替"
  - nfr: "運用 F.1.1.2 (Lv3: モバイル対応)"
    decision: "User ポータルをモバイルファースト設計。レスポンシブブレークポイント: 640/768/1024/1280px"

storybook:
  framework: "nextjs-vite"
  addons:
    - "@storybook/addon-essentials"
    - "@storybook/addon-interactions"
    - "@storybook/addon-a11y"
  categories:
    Brand:
      - "Logo"
      - "Icons"
    UI:
      - "Button"
      - "Badge"
      - "Card"
      - "Input"
      - "Icon"
    Domain:
      - "RoomCard"
      - "SearchFilter"
      - "BookingCalendar"
      - "StarRating"
      - "PriceDisplay"
      - "OwnerStatusBadge"
      - "ReservationStatusBadge"
      - "InquiryStatusBadge"
      - "InquiryThread"
      - "SettlementSummary"
      - "DashboardChart"
    Docs:
      - "Introduction"
      - "DesignTokens"
      - "ScreenMapping"
