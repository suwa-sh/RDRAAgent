source: "初期デザインシステム生成: 貸し会議室マッチングSaaS"

brand:
  name: "RoomConnect"
  colors:
    primary:
      hex: "#2563EB"
      name: "Blue 600"
    secondary:
      hex: "#0D9488"
      name: "Teal 600"
  typography:
    sans: "Noto Sans JP, Inter, system-ui, sans-serif"
    mono: "JetBrains Mono, Fira Code, monospace"
    scale:
      xs: "0.75rem"
      sm: "0.875rem"
      base: "1rem"
      lg: "1.125rem"
      xl: "1.25rem"
      2xl: "1.5rem"
      3xl: "1.875rem"
  voice:
    tone: "信頼性と親しみやすさを両立した丁寧な口調"
    principles:
      - "明確で簡潔な日本語表現"
      - "専門用語を避け、誰でも理解できる言葉を使う"
      - "安心感を与える肯定的な表現"
  logo:
    variants:
      - name: "full"
        path: "assets/logo-full.svg"
      - name: "icon"
        path: "assets/logo-icon.svg"
      - name: "stacked"
        path: "assets/logo-stacked.svg"
  icons:
    style: "outlined"
    source_dir: "assets/icons/"

portals:
  - id: "user"
    name: "利用者ポータル"
    actor: "利用者"
    primary_color: "#2563EB"
    screen_count: 9
  - id: "owner"
    name: "オーナーポータル"
    actor: "会議室オーナー"
    primary_color: "#0D9488"
    screen_count: 15
  - id: "admin"
    name: "管理者ポータル"
    actor: "サービス運営担当者"
    primary_color: "#475569"
    screen_count: 9

